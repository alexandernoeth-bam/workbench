// ═══════════════════════════════════════════════════
// TAGESZETTEL GENERIEREN
// ═══════════════════════════════════════════════════
function generateZettel() {
  const heute = todayISO();
  let eintraege = [];
  let reihenfolge = 0;

  state.morgenAusgewaehlt.forEach(a => {
    // Plan-Schritt ohne Aufgaben-Referenz
    if (a.istPlanSchritt) {
      eintraege.push({
        id: genId(),
        typ: 'aufgabe',
        text: a.titel,
        erledigt: false,
        zusatz: '',
        quelle: a.quelle,
        refId: null,
        planId: null,
        planTitel: a.planTitel,
        miniplanId: null,
        istPlan: false,
        istSchritt: false,
        abschnitt: 'aufgaben',
        reihenfolge: reihenfolge++,
        transferiert: false,
        transferAktion: null,
        kennzeichen: { urgent: false, unclear: false, idea: false },
        groesse: null,
        deadline: null,
        terminDaten: null
      });
      return; // nächster Eintrag
    }
    eintraege.push({
      id: genId(),
      typ: 'aufgabe',
      text: a.titel,
      erledigt: false,
      zusatz: '',
      quelle: a.quelle,
      refId: a.refId,
      planId: a.planId,
      planTitel: a.planTitel,
      miniplanId: null,
      abschnitt: 'aufgaben',
      reihenfolge: reihenfolge++,
      transferiert: false,
      transferAktion: null
    });
  });

  const zettel = {
    id: genId(),
    datum: heute,
    status: 'aktiv',
    eintraege: eintraege,
    quellen: {
      work: state.quellen.work ? { dateiname: state.quellen.work.dateiname, daten: state.quellen.work.daten } : null,
      priv: state.quellen.priv ? { dateiname: state.quellen.priv.dateiname, daten: state.quellen.priv.daten } : null
    },
    erstelltAm: new Date().toISOString(),
    uebertragAm: null
  };

  DB.tageszettel.push(zettel);
  saveDB();

  state.activeZettelId = zettel.id;
  showToast('✓ Tageszettel generiert');
  renderZettel();
  showScreen('zettel');
  setBadge('aktiv', 'badge-active');
}

// ═══════════════════════════════════════════════════
// TAGESZETTEL RENDERN
// ═══════════════════════════════════════════════════
function getAktuellerZettel() {
  return DB.tageszettel.find(z => z.id === state.activeZettelId) || null;
}

function openZettel(id) {
  state.activeZettelId = id;
  renderZettel();
  showScreen('zettel');
  setBadge('aktiv', 'badge-active');
}

function renderZettel() {
  const zettel = getAktuellerZettel();
  if (!zettel) { renderStartScreen(); return; }

  const abschnitte = ['aufgaben', 'termine', 'tagesueber', 'notizen'];
  const abschnittLabels = {
    aufgaben: 'Aufgaben',
    termine: 'Termine',
    tagesueber: 'Tagsüber',
    notizen: 'Notizen'
  };

  let html = '';

  // Erinnerungs-Sektion: Termine mit erinnerungAktiv=true ganz oben
  const erinnerungen = zettel.eintraege.filter(e =>
    e.terminDaten && e.terminDaten.erinnerungAktiv && !e.erledigt
  ).sort((a, b) => (a.terminDaten.erinnerung || '').localeCompare(b.terminDaten.erinnerung || ''));

  if (erinnerungen.length > 0) {
    html += `<div class="p-section-heute">
      <div class="p-section-heute-title">Heute</div>`;
    erinnerungen.forEach(e => {
      const td = e.terminDaten;
      html += `<div class="erinnerung-item">
        <div class="p-cb${e.erledigt ? ' done' : ''}" onclick="toggleEintrag('${e.id}');renderZettel();" style="flex-shrink:0;margin-top:0;">${e.erledigt ? '✓' : ''}</div>
        <span class="erinnerung-zeit">${escHtml(td.erinnerung || td.start || '')}</span>
        <span class="erinnerung-text${e.erledigt ? ' done' : ''}">${escHtml(e.text)}${td.ort ? ' <span style=\"color:#8a7a68;font-size:13px;font-family:sans-serif;\">('+escHtml(td.ort)+')</span>' : ''}</span>
      </div>`;
    });
    html += `</div>`;
  }

  abschnitte.forEach(abschnitt => {
    const alleImAbschnitt = zettel.eintraege
      .filter(e => e.abschnitt === abschnitt)
      .sort((a, b) => a.reihenfolge - b.reihenfolge);

    if (abschnitt === 'tagesueber' && alleImAbschnitt.length === 0) return;
    if (abschnitt === 'notizen' && alleImAbschnitt.length === 0) return;

    html += `<div class="p-section-head">${abschnittLabels[abschnitt]}</div>`;

    // Plan-bewusste Ausgabe: Schritte direkt nach Plan-Zeile
    // Gruppen: [plan, schritt, schritt, ..., normale aufgabe, ...]
    const ausgegeben = new Set();
    alleImAbschnitt.forEach((e, i) => {
      if (ausgegeben.has(e.id)) return;
      ausgegeben.add(e.id);
      html += renderZettelRow(e, abschnitt, i);

      // Wenn es ein Plan ist: Schritte direkt danach ausgeben
      if (e.istPlan && e.planId) {
        const schritte = alleImAbschnitt.filter(s => s.istSchritt && s.planId === e.planId);
        schritte.forEach((s, si) => {
          ausgegeben.add(s.id);
          html += renderZettelRow(s, abschnitt, si);
        });
        // Schritt-hinzufügen: über Plan-Editor
      }
    });
  });

  // Leere Eingabezeile
  html += `<div class="p-row empty">
    <div class="p-handle" style="opacity:0.2">⠿</div>
    <div class="p-left">
      <div class="p-line1">
        <div class="p-cb"></div>
        <div class="p-text" onclick="addEntry('aufgabe')" style="cursor:pointer;">Neuer Eintrag …</div>
      </div>
    </div>
    <div class="p-right"></div>
  </div>`;

  document.getElementById('paper-rows').innerHTML = html;
  updateZettelToolbar();

  // Langer Druck für Touch-Geräte auf jede Zeile
  document.querySelectorAll('.p-left[id^="left-"]').forEach(el => {
    const id = el.id.replace('left-', '');
    setupLongPress(el, id);
  });
}

function renderZettelRow(e, abschnitt, i) {
  const istNotiz  = e.typ === 'notiz';
  const istPlan   = e.istPlan === true;
  const istSchritt= e.istSchritt === true;

  // Checkbox: Notiz=Quadrat, Plan=kein Element (padding übernimmt Positionierung), Aufgabe=Kästchen
  let cbHtml = '';
  if (istNotiz) {
    cbHtml = `<div class="p-notiz-dash">■</div>`;
  } else if (istPlan) {
    cbHtml = ''; // kein Platzhalter – p-left padding übernimmt Ausrichtung
  } else {
    cbHtml = `<div class="p-cb${e.erledigt ? ' done' : ''}" onclick="toggleEintrag('${e.id}')">${e.erledigt ? '✓' : ''}</div>`;
  }

  // Text-Klasse
  let textClass = istPlan ? 'p-plan-titel' : 'p-text';
  if (e.erledigt) textClass += ' done';
  if (istNotiz)   textClass += ' notiz';

  // Rechte Spalte: Kennzeichen + Plan-Pill (nur Einzelaufgabe mit Plan)
  let pillsHtml = '';
  if (!istPlan && !istSchritt && e.planTitel) {
    pillsHtml += `<span class="p-pill pp-pl">${escHtml(e.planTitel)}</span>`;
  }
  const kz = e.kennzeichen || {};
  if (kz.urgent)  pillsHtml += `<span class="p-sig ps-urgent">!</span>`;
  if (kz.unclear) pillsHtml += `<span class="p-sig ps-unclear">?</span>`;
  if (kz.idea)    pillsHtml += `<span class="p-sig ps-idea">💡</span>`;
  // Größe wird im Aufgabentext angezeigt, nicht in der Marginalspalte
  if (e.deadline) pillsHtml += `<span class="p-sig ps-deadline">⚑${formatDeadlineShort(e.deadline)}</span>`;

  // Freitext-Zusatz (nicht bei Plan-Hauptzeile)
  // Schritte: kein leerer Platzhalter (würde Leerzeile erzeugen)
  let zusatzHtml = '';
  if (!istPlan) {
    const subIndent = istSchritt ? '36px' : '30px';
    if (e.zusatz) {
      zusatzHtml = `<div class="p-sub" onclick="editZusatz('${e.id}')" style="cursor:text;padding-left:${subIndent};">${escHtml(e.zusatz)}</div>`;
    } else if (!istSchritt) {
      zusatzHtml = `<div class="p-sub-placeholder" onclick="editZusatz('${e.id}')" style="cursor:text;min-height:20px;color:#c8c0b8;font-size:16px;padding-left:${subIndent};font-family:'Kalam','Georgia',cursive;"></div>`;
    }
  }

  // Termin-Prefix / Suffix
  let terminTextPrefix = '';
  let terminTextSuffix = '';
  if (e.terminDaten) {
    const td = e.terminDaten;
    if (td.start) terminTextPrefix = td.start + (td.ende ? ' – ' + td.ende : '') + ': ';
    if (td.ort)   terminTextSuffix = ' (' + escHtml(td.ort) + ')';
  }

  // Delete-Button (nur Edit-Modus, via CSS)
  const deleteBtn = `<button class="p-delete-btn" onclick="deleteEintrag('${e.id}')">×</button>`;

  // Plan-Edit-Button: auf Plan-Zeile → öffnet Plan-Editor
  //                   auf Einzelaufgabe → öffnet Hochstufen-Dialog
  //                   auf Schritt → kein Button (Schritt über Plan editieren)
  let planEditBtn = '';
  if (istPlan) {
    planEditBtn = `<button class="plan-edit-btn" onclick="openPlanEditor('${e.planId}')">✎ Plan</button>`;
  } else if (!istSchritt && e.typ === 'aufgabe') {
    planEditBtn = `<button class="plan-edit-btn" onclick="openPlanEditor(null,'${e.id}')">→ Plan</button>`;
  }

  // Row-Klassen
  let rowClass = 'p-row';
  if (istPlan)    rowClass += ' ist-plan';
  if (istSchritt) rowClass += ' ist-schritt';

  // Schritte sind nicht einzeln verschiebbar (nur via Plan-Editor)
  const draggableAttr = istSchritt ? 'draggable="false"' : 'draggable="true"';
  const dragHandlers = istSchritt ? '' : `
    ondragstart="onDragStart(event,'${e.id}','${abschnitt}')"
    ondragover="onDragOver(event)"
    ondrop="onDrop(event,'${e.id}','${abschnitt}')"
    ondragend="onDragEnd(event)"
    ondragleave="onDragLeave(event)"`;

  return `<div class="${rowClass}" data-id="${e.id}" data-abschnitt="${abschnitt}"
    ${draggableAttr}${dragHandlers}>
    ${deleteBtn}
    <div class="p-handle" style="${istSchritt ? 'cursor:default;opacity:0.2;' : ''}">⠿</div>
    <div class="p-left" oncontextmenu="return onContextMenu(event,'${e.id}')" id="left-${e.id}"
         onclick="if(state.editMode && !event.target.closest('button')){ openEditModal('${e.id}'); }">
      <div class="p-line1">
        ${cbHtml}
        <div class="${textClass}"><span class="termin-prefix">${terminTextPrefix}</span>${escHtml(e.text)}${e.groesse && !istPlan && !istSchritt && e.typ !== 'termin' ? ` <span style="color:#9a8a78;font-size:14px;font-family:sans-serif;">(${escHtml(e.groesse)} min)</span>` : ''}<span class="termin-suffix">${terminTextSuffix}</span></div>
        ${planEditBtn}
      </div>
      ${zusatzHtml}
    </div>
    <div class="p-right">${pillsHtml}</div>
  </div>`;
}

function updateZettelToolbar() {
  const zettel = getAktuellerZettel();
  if (!zettel) return;
  const aufgaben = zettel.eintraege.filter(e => e.typ !== 'notiz');
  const done = aufgaben.filter(e => e.erledigt).length;
  const total = aufgaben.length;
  const el = document.getElementById('tb-progress');
  if (el) el.textContent = `☑ ${done}/${total}`;
}

function toggleEintrag(id) {
  const zettel = getAktuellerZettel();
  if (!zettel) return;
  const e = zettel.eintraege.find(x => x.id === id);
  if (!e) return;
  e.erledigt = !e.erledigt;
  // Plan: alle Schritte mittogglen
  if (e.istPlan && e.planId) {
    zettel.eintraege.filter(s => s.istSchritt && s.planId === e.planId)
      .forEach(s => { s.erledigt = e.erledigt; });
  }
  saveDB();
  renderZettel();
}

function showProgress() {
  const zettel = getAktuellerZettel();
  if (!zettel) return;
  const aufgaben = zettel.eintraege.filter(e => e.typ !== 'notiz');
  const done = aufgaben.filter(e => e.erledigt).length;
  showToast(`${done} von ${aufgaben.length} erledigt`);
}

// ═══════════════════════════════════════════════════
// EINTRAG HINZUFÜGEN (Modal)
// ═══════════════════════════════════════════════════
function addEntry(typ) {
  const labels = { aufgabe: 'Neue Aufgabe', termin: 'Neuer Termin', notiz: 'Neue Notiz', miniplan: 'Mini-Plan Schritt' };
  const abschnittMap = { aufgabe: 'tagesueber', termin: 'termine', notiz: 'notizen', miniplan: 'tagesueber' };

  const istTermin = typ === 'termin';
  const istNotiz  = typ === 'notiz';
  const istPlan   = typ === 'miniplan';

  const sheet = document.getElementById('modal-sheet');
  sheet.innerHTML = `
    <div class="modal-title">${labels[typ] || 'Neuer Eintrag'}</div>
    <div>
      <div class="modal-label">${istTermin ? 'Termin-Titel' : 'Text'}</div>
      <textarea class="modal-input" id="modal-text" rows="2"
        placeholder="${istNotiz ? 'Notiz …' : istTermin ? 'z.B. Jour Fixe Team' : 'Aufgabe …'}"></textarea>
    </div>

    ${istTermin ? `
    <div class="modal-row">
      <div style="flex:1;">
        <div class="modal-label">Start</div>
        <input class="modal-input" id="modal-start" type="time" placeholder="09:00">
      </div>
      <div style="flex:1;">
        <div class="modal-label">Ende</div>
        <input class="modal-input" id="modal-ende" type="time" placeholder="10:00">
      </div>
    </div>
    <div>
      <div class="modal-label">Ort (optional)</div>
      <input class="modal-input" id="modal-ort" placeholder="Raum, Adresse …">
    </div>
    <div class="modal-row" style="align-items:center;gap:10px;">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#4a3820;">
        <input type="checkbox" id="modal-erinnerung-aktiv" onchange="toggleErinnerungZeit()" style="width:16px;height:16px;">
        Erinnerung anzeigen
      </label>
      <input class="modal-input" id="modal-erinnerung" type="time"
        style="flex:1;display:none;" placeholder="08:45">
    </div>` : ''}

    ${!istTermin && !istNotiz ? `
    <div>
      <div class="modal-label">Kennzeichen</div>
      <div class="sig-row">
        <button class="sig-picker-btn urgent" id="sig-urgent" onclick="toggleSig('urgent')">❗ Dringend</button>
        <button class="sig-picker-btn unclear" id="sig-unclear" onclick="toggleSig('unclear')">❓ Unklar</button>
        <button class="sig-picker-btn idea"   id="sig-idea"   onclick="toggleSig('idea')">💡 Idee</button>
      </div>
    </div>
    <div class="modal-row">
      <div style="flex:1;">
        <div class="modal-label">Größe</div>
        <div class="size-picker">
          <button class="size-btn" id="size-S" onclick="toggleSize('S')">S</button>
          <button class="size-btn" id="size-M" onclick="toggleSize('M')">M</button>
          <button class="size-btn" id="size-L" onclick="toggleSize('L')">L</button>
        </div>
      </div>
      <div style="flex:1;">
        <div class="modal-label">Deadline</div>
        <input class="modal-input" id="modal-deadline" type="date">
      </div>
    </div>` : ''}

    ${istPlan ? `
    <div>
      <div class="modal-label">Plan-Name</div>
      <input class="modal-input" id="modal-planname" placeholder="z.B. Angebot XY">
    </div>` : ''}

    <div>
      <div class="modal-label">Freitext darunter (optional)</div>
      <input class="modal-input" id="modal-zusatz" placeholder="Ergänzung …">
    </div>

    <div class="modal-row">
      <button class="btn-secondary w-full" onclick="closeModal()">Abbrechen</button>
      <button class="btn-primary w-full" onclick="saveNewEntry('${typ}','${abschnittMap[typ]}')">Hinzufügen</button>
    </div>`;
  openModal();
  setTimeout(() => document.getElementById('modal-text').focus(), 100);
}

function saveNewEntry(typ, abschnitt) {
  const text = (document.getElementById('modal-text').value || '').trim();
  if (!text) { showToast('Bitte Text eingeben'); return; }

  const zettel = getAktuellerZettel();
  if (!zettel) return;

  const zusatz = (document.getElementById('modal-zusatz')?.value || '').trim();
  const planname = (document.getElementById('modal-planname')?.value || '').trim();

  const existingInAbschnitt = zettel.eintraege.filter(e => e.abschnitt === abschnitt);
  const maxReihenfolge = existingInAbschnitt.length > 0
    ? Math.max(...existingInAbschnitt.map(e => e.reihenfolge)) + 1
    : 0;

  const eintrag = {
    id: genId(),
    typ: typ === 'miniplan' ? 'aufgabe' : typ,
    text: text,
    erledigt: false,
    zusatz: zusatz,
    quelle: 'frei',
    refId: null,
    planId: null,
    planTitel: planname || null,
    miniplanId: planname ? genId() : null,
    istPlan: false,
    istSchritt: false,
    abschnitt: abschnitt,
    reihenfolge: maxReihenfolge,
    transferiert: false,
    transferAktion: null,
    kennzeichen: leseKennzeichen(),
    groesse: leseGroesse(),
    deadline: (document.getElementById('modal-deadline')?.value || '') || null,
    terminDaten: typ === 'termin' ? leseTerminDaten() : null
  };

  zettel.eintraege.push(eintrag);
  saveDB();
  closeModal();
  renderZettel();
}

function editEintrag(id) {
  const zettel = getAktuellerZettel();
  if (!zettel) return;
  const e = zettel.eintraege.find(x => x.id === id);
  if (!e) return;

  const sheet = document.getElementById('modal-sheet');
  sheet.innerHTML = `
    <div class="modal-title">Eintrag bearbeiten</div>
    <div>
      <div class="modal-label">Text</div>
      <textarea class="modal-input" id="modal-text" rows="3">${escHtml(e.text)}</textarea>
    </div>
    <div>
      <div class="modal-label">Zusatz</div>
      <input class="modal-input" id="modal-zusatz" value="${escHtml(e.zusatz || '')}">
    </div>
    <div class="modal-row">
      <button class="btn-danger w-full" onclick="deleteEintrag('${id}')">Löschen</button>
      <button class="btn-primary w-full" onclick="saveEditEintrag('${id}')">Speichern</button>
    </div>`;
  openModal();
}

function saveEditEintrag(id) {
  const zettel = getAktuellerZettel();
  if (!zettel) return;
  const e = zettel.eintraege.find(x => x.id === id);
  if (!e) return;
  const text = (document.getElementById('modal-text').value || '').trim();
  if (!text) { showToast('Bitte Text eingeben'); return; }
  e.text = text;
  e.zusatz = (document.getElementById('modal-zusatz')?.value || '').trim();
  // Kennzeichen + Größe + Deadline
  if (e.typ !== 'termin' && e.typ !== 'notiz') {
    e.kennzeichen = leseKennzeichen();
    e.groesse = leseGroesse();
    e.deadline = (document.getElementById('modal-deadline')?.value || '') || null;
  }
  // Termin-Daten
  if (e.typ === 'termin') {
    e.terminDaten = leseTerminDaten();
  }
  saveDB();
  closeModal();
  renderZettel();
}

function deleteEintrag(id) {
  const zettel = getAktuellerZettel();
  if (!zettel) return;
  zettel.eintraege = zettel.eintraege.filter(e => e.id !== id);
  saveDB();
  closeModal();
  renderZettel();
}

// ═══════════════════════════════════════════════════
// DRAG & DROP – Plan-Block-aware
// Schritte: NICHT draggable
// Plan-Titel: zieht ganzen Block (Titel + alle Schritte)
// Normale Aufgaben: wie bisher
// ═══════════════════════════════════════════════════
function onDragStart(event, id, abschnitt) {
  const zettel = getAktuellerZettel();
  if (!zettel) return;
  const e = zettel.eintraege.find(x => x.id === id);
  if (!e) return;

  // Schritte sind nicht einzeln verschiebbar
  if (e.istSchritt) { event.preventDefault(); return; }

  state.dragSrcId = id;
  state.dragSrcAbschnitt = abschnitt;
  // Merken ob es ein Plan ist (dann ganzen Block verschieben)
  state.dragSrcIstPlan = e.istPlan === true;
  state.dragSrcPlanId  = e.planId || null;
  event.dataTransfer.effectAllowed = 'move';
  event.currentTarget.classList.add('dragging');
}

function onDragOver(event) {
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
  const row = event.currentTarget;
  // Schritte als Drop-Ziel ablehnen (kein Einfügen zwischen Schritte)
  if (row.classList.contains('ist-schritt')) return;
  const rect = row.getBoundingClientRect();
  const midY = rect.top + rect.height / 2;
  row.classList.remove('drag-over-top', 'drag-over-bottom');
  if (event.clientY < midY) row.classList.add('drag-over-top');
  else row.classList.add('drag-over-bottom');
}

function onDragLeave(event) {
  event.currentTarget.classList.remove('drag-over-top', 'drag-over-bottom');
}

function onDrop(event, targetId, targetAbschnitt) {
  event.preventDefault();
  event.currentTarget.classList.remove('drag-over-top', 'drag-over-bottom');

  const zettel = getAktuellerZettel();
  if (!zettel || state.dragSrcId === targetId) return;

  const srcEntry = zettel.eintraege.find(e => e.id === state.dragSrcId);
  if (!srcEntry) return;

  // Drop auf Schritt → ablehnen
  const targetEntry = zettel.eintraege.find(e => e.id === targetId);
  if (targetEntry && targetEntry.istSchritt) return;

  const row = event.currentTarget;
  const rect = row.getBoundingClientRect();
  const insertBefore = event.clientY < rect.top + rect.height / 2;

  // Einträge im Abschnitt sortiert – ohne Schritte (die hängen am Plan)
  const abschnittEintraege = zettel.eintraege
    .filter(e => e.abschnitt === targetAbschnitt && !e.istSchritt)
    .sort((a, b) => a.reihenfolge - b.reihenfolge);

  const targetIdx = abschnittEintraege.findIndex(e => e.id === targetId);
  const srcIdx    = abschnittEintraege.findIndex(e => e.id === state.dragSrcId);
  if (srcIdx < 0 || targetIdx < 0) return;

  // Src aus Liste entfernen
  abschnittEintraege.splice(srcIdx, 1);
  const insertIdx = abschnittEintraege.findIndex(e => e.id === targetId);
  abschnittEintraege.splice(insertBefore ? insertIdx : insertIdx + 1, 0, srcEntry);

  // Reihenfolge der Nicht-Schritte neu setzen
  abschnittEintraege.forEach((e, i) => { e.reihenfolge = i * 10; });

  // Schritte direkt nach ihrem Plan einordnen
  if (state.dragSrcIstPlan && state.dragSrcPlanId) {
    const planReihenfolge = srcEntry.reihenfolge;
    zettel.eintraege
      .filter(e => e.istSchritt && e.planId === state.dragSrcPlanId)
      .forEach((s, si) => { s.reihenfolge = planReihenfolge + si + 1; });
  }

  // Alle Schritte aller Pläne neu nach ihrem Plan-Titel einordnen
  zettel.eintraege
    .filter(e => e.istPlan && e.planId)
    .forEach(plan => {
      zettel.eintraege
        .filter(s => s.istSchritt && s.planId === plan.planId)
        .sort((a, b) => a.reihenfolge - b.reihenfolge)
        .forEach((s, si) => { s.reihenfolge = plan.reihenfolge + 0.1 + si * 0.01; });
    });

  saveDB();
  renderZettel();
}

function onDragEnd(event) {
  event.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.p-row').forEach(r => r.classList.remove('drag-over-top', 'drag-over-bottom'));
  state.dragSrcIstPlan = false;
  state.dragSrcPlanId  = null;
}

// ═══════════════════════════════════════════════════
// TRANSFER / RE-IMPORT
// ═══════════════════════════════════════════════════
function startTransfer() {
  if (state.activeZettelId) {
    openTransfer(state.activeZettelId);
  } else {
    showToast('Kein aktiver Tageszettel');
  }
}

function openTransfer(id) {
  state.activeZettelId = id;
  renderTransfer();
  showScreen('transfer');
  setBadge('transfer', 'badge-transfer');
}

function renderTransfer() {
  const zettel = getAktuellerZettel();
  if (!zettel) return;

  const eintraege = zettel.eintraege;

  // Nur übertragungsrelevante Einträge zählen (keine Termine, keine Notizen, keine Schritte)
  const relevant = eintraege.filter(e =>
    e.typ !== 'notiz' && e.typ !== 'termin' && !e.istSchritt
  );
  const total      = relevant.length;
  const entschieden = relevant.filter(e => e.transferiert).length;
  const pct = total > 0 ? Math.round(entschieden / total * 100) : 100;

  document.getElementById('transfer-lbl').textContent = `${entschieden} von ${total} entschieden`;
  document.getElementById('transfer-pct').textContent = pct + '%';
  document.getElementById('transfer-fill').style.width = pct + '%';

  const list = document.getElementById('transfer-list');

  // Gruppierung: Referenz-Aufgaben, Plan-Blöcke, Freie Einträge
  const refAufgaben    = eintraege.filter(e => e.refId && !e.istSchritt && !e.istPlan && e.typ !== 'notiz');
  const freieEintraege = eintraege.filter(e => !e.refId && !e.istSchritt && !e.istPlan && e.typ !== 'notiz' && e.quelle === 'frei');
  const planBloecke    = eintraege.filter(e => e.istPlan);

  // Mini-Pläne (alter miniplanId-Weg, Kompatibilität)
  const miniplanMap = {};
  eintraege.filter(e => e.miniplanId).forEach(e => {
    if (!miniplanMap[e.miniplanId]) miniplanMap[e.miniplanId] = { titel: e.planTitel, schritte: [] };
    miniplanMap[e.miniplanId].schritte.push(e);
  });

  let html = '';

  // Referenz-Aufgaben
  refAufgaben.forEach(e => {
    const cls = e.transferiert ? (e.erledigt ? 'ri-done' : 'ri-open') : '';
    const statBadge = e.erledigt
      ? `<span class="ri-stat rs-done">Erledigt</span>`
      : `<span class="ri-stat rs-open">Offen</span>`;
    const qTyp = e.quelle === 'work' ? 'Beruflich' : 'Privat';
    const planInfo = e.planTitel ? ` · Plan: ${escHtml(e.planTitel)}` : '';

    let aktionen = '';
    if (e.erledigt) {
      aktionen = `<button class="ri-btn rb-ok" onclick="transferAktion('${e.id}','erledigt')">Als erledigt übertragen</button>
                  <button class="ri-btn rb-sec" onclick="transferAktion('${e.id}','ueberspringen')">Überspringen</button>`;
    } else {
      aktionen = `<button class="ri-btn rb-sec" onclick="transferAktion('${e.id}','offen')">Bleibt offen</button>
                  <button class="ri-btn rb-del" onclick="transferAktion('${e.id}','verwerfen')">Verwerfen</button>`;
    }

    html += `<div class="ri ${cls}" id="ri-${e.id}">
      <div class="ri-top">
        <div class="ri-ico">${e.erledigt ? '✅' : '⏳'}</div>
        <div class="ri-inf">
          <div class="ri-tit">${escHtml(e.text)}</div>
          <div class="ri-sub">Referenz-Aufgabe · ${qTyp}${planInfo}</div>
        </div>
        ${statBadge}
      </div>
      <div class="ri-acts">${aktionen}</div>
    </div>`;
  });

  // Plan-Blöcke (istPlan=true, neu erstellt auf dem Zettel)
  planBloecke.forEach(plan => {
    const schritte = eintraege
      .filter(s => s.istSchritt && s.planId === plan.planId)
      .sort((a, b) => a.reihenfolge - b.reihenfolge);
    const done  = schritte.filter(s => s.erledigt).length;
    const total = schritte.length;
    const allTransferred = plan.transferiert;

    const stepsHtml = schritte.map(s => `
      <div class="ri-step">
        <span style="color:${s.erledigt ? 'var(--color-done)' : 'var(--color-danger)'};">${s.erledigt ? '✓' : '○'}</span>
        ${escHtml(s.text)}
        <span class="ri-sb ${s.erledigt ? 'rsb-d' : 'rsb-o'}">${s.erledigt ? 'erledigt' : 'offen'}</span>
      </div>`).join('');

    html += `<div class="ri ri-free" id="ri-plan-${plan.id}">
      <div class="ri-top">
        <div class="ri-ico">📋</div>
        <div class="ri-inf">
          <div class="ri-tit">${escHtml(plan.text)}</div>
          <div class="ri-sub">Plan · ${done} von ${total} erledigt → wird in Inbox angelegt</div>
        </div>
        ${allTransferred ? '<span class="ri-stat rs-done">✓</span>' : ''}
      </div>
      ${total > 0 ? `<div class="ri-steps">${stepsHtml}</div>` : ''}
      <div class="ri-acts">
        <button class="ri-btn rb-ok" onclick="transferAktion('${plan.id}','plan-anlegen')">In Delta aufnehmen</button>
        <button class="ri-btn rb-del" onclick="transferAktion('${plan.id}','verwerfen')">Verwerfen</button>
      </div>
    </div>`;
  });

  // Mini-Pläne (alter miniplanId-Weg, Kompatibilität)
  Object.entries(miniplanMap).forEach(([mpId, mp]) => {
    const done = mp.schritte.filter(s => s.erledigt).length;
    const total = mp.schritte.length;
    const stepsHtml = mp.schritte.map(s => `
      <div class="ri-step">
        <span style="color:${s.erledigt ? 'var(--color-done)' : 'var(--color-danger)'};">${s.erledigt ? '✓' : '○'}</span>
        ${escHtml(s.text)}
        <span class="ri-sb ${s.erledigt ? 'rsb-d' : 'rsb-o'}">${s.erledigt ? 'erledigt' : 'offen'}</span>
      </div>`).join('');

    html += `<div class="ri ri-free" id="ri-mp-${mpId}">
      <div class="ri-top">
        <div class="ri-ico">📋</div>
        <div class="ri-inf">
          <div class="ri-tit">Plan: ${escHtml(mp.titel || 'Unbenannt')}</div>
          <div class="ri-sub">Tagsüber erstellt · ${done} erledigt · ${total - done} offen</div>
        </div>
      </div>
      <div class="ri-steps">${stepsHtml}</div>
      <div class="ri-acts">
        <button class="ri-btn rb-ok" onclick="transferMiniplan('${mpId}','plan-anlegen')">In Delta aufnehmen</button>
        <button class="ri-btn rb-sec" onclick="transferMiniplan('${mpId}','text')">Nur Text</button>
      </div>
    </div>`;
  });

  // Freie Einträge → landen in Inbox
  freieEintraege.forEach(e => {
    const cls = e.transferiert ? 'ri-done' : '';
    html += `<div class="ri ${cls}" id="ri-${e.id}">
      <div class="ri-top">
        <div class="ri-ico">${e.erledigt ? '✅' : '📝'}</div>
        <div class="ri-inf">
          <div class="ri-tit">${escHtml(e.text)}</div>
          <div class="ri-sub">Freier Eintrag · ${e.erledigt ? 'erledigt' : 'offen'} · → Inbox</div>
        </div>
        ${e.erledigt ? '<span class="ri-stat rs-done">Erledigt</span>' : '<span class="ri-stat rs-open">Offen</span>'}
      </div>
      <div class="ri-acts">
        <button class="ri-btn rb-ok" onclick="transferAktion('${e.id}','aufgabe-${e.erledigt ? 'erledigt' : 'offen'}')">In Delta aufnehmen</button>
        <button class="ri-btn rb-del" onclick="transferAktion('${e.id}','verwerfen')">Verwerfen</button>
      </div>
    </div>`;
  });

  if (html === '') {
    html = `<div style="text-align:center;padding:40px;color:var(--color-muted);">Keine Einträge zum Übertragen</div>`;
  }

  list.innerHTML = html;
}

function transferAktion(id, aktion) {
  const zettel = getAktuellerZettel();
  if (!zettel) return;
  const e = zettel.eintraege.find(x => x.id === id);
  if (!e) return;
  e.transferiert = true;
  e.transferAktion = aktion;
  saveDB();
  renderTransfer();
  showToast('✓ Entschieden');
}

function transferMiniplan(mpId, aktion) {
  const zettel = getAktuellerZettel();
  if (!zettel) return;
  zettel.eintraege.filter(e => e.miniplanId === mpId).forEach(e => {
    e.transferiert = true;
    e.transferAktion = aktion;
  });
  saveDB();
  renderTransfer();
  if (aktion === 'verknuepfen') {
    showToast('🔍 Verknüpfung: In nächster Version implementiert');
  } else {
    showToast('✓ Plan-Aktion gespeichert');
  }
}

function finishTransfer() {
  const zettel = getAktuellerZettel();
  if (!zettel) return;

  const offen = zettel.eintraege.filter(e =>
    !e.transferiert && e.typ !== 'notiz' && e.typ !== 'termin' && !e.istSchritt
  ).length;
  if (offen > 0) {
    if (!confirm(`Es sind noch ${offen} Einträge nicht entschieden. Trotzdem abschließen?`)) return;
  }

  // Deltas generieren (zwei Dateien: beruflich + privat)
  const deltas = erstelleDeltas(zettel);

  zettel.status = 'uebertragen';
  zettel.uebertragAm = new Date().toISOString();
  saveDB();

  // Beide Delta-Dateien exportieren
  exportDeltas(deltas, zettel.datum);

  state.activeZettelId = null;
  state.quellen = { work: null, priv: null };
  renderStartScreen();
}

function erstelleDeltas(zettel) {
  const heute = zettel.datum;

  // Zwei separate Deltas – eines pro Quelle
  const deltas = {
    work: {
      version: '1.0',
      exportDatum: new Date().toISOString(),
      zettelDatum: heute,
      quelle: 'beruflich',
      erledigteAufgabenIds: [],
      neueAufgaben: [],
      neuePlaene: [],
    },
    priv: {
      version: '1.0',
      exportDatum: new Date().toISOString(),
      zettelDatum: heute,
      quelle: 'privat',
      erledigteAufgabenIds: [],
      neueAufgaben: [],
      neuePlaene: [],
    }
  };

  zettel.eintraege.forEach(e => {
    const quelle = e.quelle === 'work' ? 'work' : 'priv';
    const delta  = deltas[quelle] || deltas.priv;

    // Erledigte Referenz-Aufgaben
    if (e.refId && e.erledigt && e.transferAktion === 'erledigt') {
      delta.erledigteAufgabenIds.push({ id: e.refId });
    }

    // Neue freie Aufgaben → Inbox
    if (!e.refId && !e.istSchritt && !e.istPlan && e.typ === 'aufgabe') {
      if (e.transferAktion === 'aufgabe-offen' || e.transferAktion === 'aufgabe-erledigt') {
        delta.neueAufgaben.push({
          titel:       e.text,
          beschreibung: e.zusatz || '',
          erledigt:    e.erledigt || e.transferAktion === 'aufgabe-erledigt',
          prioritaet:  e.groesse === 'L' ? 'hoch' : e.groesse === 'S' ? 'niedrig' : 'mittel',
          faellig:     e.deadline || null,
          bereich:     'inbox',
          datum:       heute
        });
      }
    }

    // Neue Pläne (istPlan, keine refId)
    if (e.istPlan && !e.refId) {
      const schritte = zettel.eintraege
        .filter(s => s.istSchritt && s.planId === e.planId)
        .sort((a, b) => a.reihenfolge - b.reihenfolge)
        .map(s => ({ titel: s.text, erledigt: s.erledigt, refId: s.refId || null }));

      delta.neuePlaene.push({
        titel: e.text, schritte, datum: heute
      });

      // Erledigte Referenz-Schritte
      schritte.forEach(s => {
        if (s.refId && s.erledigt) {
          delta.erledigteAufgabenIds.push({ id: s.refId });
        }
      });
    }
  });

  // Duplikate entfernen
  ['work', 'priv'].forEach(q => {
    const seen = new Set();
    deltas[q].erledigteAufgabenIds = deltas[q].erledigteAufgabenIds.filter(x => {
      if (seen.has(x.id)) return false;
      seen.add(x.id); return true;
    });
  });

  return deltas;
}

function downloadJson(daten, dateiname) {
  const blob = new Blob([JSON.stringify(daten, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = dateiname;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exportDeltas(deltas, datum) {
  const d  = new Date(datum + 'T00:00:00');
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const jj = d.getFullYear();
  const prefix = `${dd}${mm}${jj}`;

  // Nur exportieren wenn Inhalt vorhanden
  const hatWorkInhalt = deltas.work.erledigteAufgabenIds.length > 0 ||
                        deltas.work.neueAufgaben.length > 0 ||
                        deltas.work.neuePlaene.length > 0;
  const hatPrivInhalt = deltas.priv.erledigteAufgabenIds.length > 0 ||
                        deltas.priv.neueAufgaben.length > 0 ||
                        deltas.priv.neuePlaene.length > 0;

  if (hatWorkInhalt) {
    downloadJson(deltas.work, `${prefix}_daypaper_delta_beruflich.json`);
  }
  if (hatPrivInhalt) {
    // Kleines Delay damit Browser beide Downloads akzeptiert
    setTimeout(() => downloadJson(deltas.priv, `${prefix}_daypaper_delta_privat.json`), 300);
  }

  const namen = [
    hatWorkInhalt ? `${prefix}_daypaper_delta_beruflich.json` : null,
    hatPrivInhalt ? `${prefix}_daypaper_delta_privat.json`    : null,
  ].filter(Boolean);

  if (namen.length === 0) {
    showToast('ℹ️ Keine Änderungen zum Exportieren');
  } else {
    showToast(`✓ Delta exportiert: ${namen.join(' + ')}`);
  }
}

function escAttr(str) {
  if (!str) return '';
  return String(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

let longPressTimer = null;
let longPressTarget = null;

function setupLongPress(el, id) {
  el.addEventListener('touchstart', (ev) => {
    longPressTarget = id;
    longPressTimer = setTimeout(() => {
      ev.preventDefault();
      openEditModal(id);
    }, 600);
  }, { passive: false });
  el.addEventListener('touchend', () => {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  });
  el.addEventListener('touchmove', () => {
    if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
  });
}

// ZUSATZ INLINE EDITIEREN
// ═══════════════════════════════════════════════════
function editZusatz(id) {
  const zettel = getAktuellerZettel();
  if (!zettel) return;
  const e = zettel.eintraege.find(x => x.id === id);
  if (!e) return;

  const placeholder = document.querySelector(`#left-${CSS.escape(id)} .p-sub-placeholder`);
  const existing = document.querySelector(`#left-${CSS.escape(id)} .p-sub`);
  const target = placeholder || existing;
  if (!target) return;

  const input = document.createElement('input');
  input.type = 'text';
  input.value = e.zusatz || '';
  input.placeholder = 'Ergänzung …';
  input.style.cssText = `
    width:100%; border:none; outline:none; background:transparent;
    font-family:'Kalam','Georgia',cursive; font-size:16px;
    color:#7a6858; font-style:italic; padding-left:30px;
    border-bottom:1px dashed #c0b8b0;
  `;

  target.replaceWith(input);
  input.focus();

  function saveZusatz() {
    e.zusatz = input.value.trim();
    saveDB();
    renderZettel();
  }

  input.addEventListener('blur', saveZusatz);
  input.addEventListener('keydown', (ev) => {
    if (ev.key === 'Enter') { ev.preventDefault(); saveZusatz(); }
    if (ev.key === 'Escape') renderZettel();
  });
}

// Temporärer State für Plan-Editor
let planEditorState = {
  planId: null,        // null = neuer Plan
  aufgabeId: null,     // Aufgabe die hochgestuft wird
  abschnitt: null,
  schritte: []         // [{id, text, erledigt, istNeu}]
};

function openPlanEditor(planId, aufgabeId) {
  const zettel = getAktuellerZettel();
  if (!zettel) return;

  planEditorState = { planId: planId || null, aufgabeId: aufgabeId || null, abschnitt: null, schritte: [] };

  let planTitel = '';
  let modalTitel = '';

  if (planId) {
    // Bestehenden Plan bearbeiten
    const plan = zettel.eintraege.find(e => e.planId === planId && e.istPlan);
    if (!plan) return;
    planTitel = plan.text;
    modalTitel = 'Plan bearbeiten';
    planEditorState.abschnitt = plan.abschnitt;
    // Schritte laden
    planEditorState.schritte = zettel.eintraege
      .filter(e => e.planId === planId && e.istSchritt)
      .sort((a, b) => a.reihenfolge - b.reihenfolge)
      .map(e => ({ id: e.id, text: e.text, erledigt: e.erledigt, istNeu: false }));
  } else if (aufgabeId) {
    // Aufgabe hochstufen
    const aufgabe = zettel.eintraege.find(e => e.id === aufgabeId);
    if (!aufgabe) return;
    planTitel = aufgabe.planTitel || '';
    modalTitel = '→ Zu Plan erweitern';
    planEditorState.abschnitt = aufgabe.abschnitt;
    // Aufgabe als erster Schritt vorbelegt
    planEditorState.schritte = [{ id: aufgabe.id, text: aufgabe.text, erledigt: aufgabe.erledigt, istNeu: false }];
  }

  renderPlanEditorModal(planTitel, modalTitel, !!planId);
}

function renderPlanEditorModal(planTitel, modalTitel, istBearbeitung) {
  const schritteHtml = planEditorState.schritte.map((s, idx) => `
    <div class="plan-modal-schritt" data-idx="${idx}">
      <div class="cb-mini${s.erledigt ? ' done' : ''}" onclick="togglePlanEditorSchritt(${idx})">${s.erledigt ? '✓' : ''}</div>
      <input type="text" value="${escHtml(s.text)}" placeholder="Schritt …"
        oninput="planEditorState.schritte[${idx}].text = this.value"
        onkeydown="if(event.key==='Enter'){event.preventDefault();addPlanEditorSchritt();}">
      <button class="del-schritt" onclick="deletePlanEditorSchritt(${idx})">×</button>
    </div>`).join('');

  const sheet = document.getElementById('modal-sheet');
  sheet.innerHTML = `
    <div class="modal-title">${modalTitel}</div>
    <div>
      <div class="modal-label">Plan-Titel</div>
      <input class="modal-input" id="plan-editor-titel" value="${escHtml(planTitel)}"
        placeholder="Plan-Name …">
    </div>
    <div>
      <div class="modal-label">Schritte</div>
      <div class="plan-schritte-liste" id="plan-schritte-liste">${schritteHtml}</div>
      <div class="add-schritt-inline">
        <input type="text" id="neuer-schritt-input" placeholder="Neuer Schritt …"
          onkeydown="if(event.key==='Enter'){event.preventDefault();addPlanEditorSchritt();}">
        <button onclick="addPlanEditorSchritt()">＋</button>
      </div>
    </div>
    <div class="modal-row" style="margin-top:8px;">
      ${istBearbeitung ? `<button class="btn-danger" style="flex:1;" onclick="deletePlan('${planEditorState.planId}')">Plan löschen</button>` : ''}
      <button class="btn-secondary" style="flex:1;" onclick="closeModal()">Abbrechen</button>
      <button class="btn-primary" style="flex:1;" onclick="savePlanEditor()">Speichern</button>
    </div>`;
  openModal();
  setTimeout(() => document.getElementById('plan-editor-titel').focus(), 100);
}

function togglePlanEditorSchritt(idx) {
  if (!planEditorState.schritte[idx]) return;
  planEditorState.schritte[idx].erledigt = !planEditorState.schritte[idx].erledigt;
  // Titel-Wert sichern vor re-render
  const titel = document.getElementById('plan-editor-titel')?.value || '';
  renderPlanEditorModal(titel, document.querySelector('.modal-title')?.textContent || '', !!planEditorState.planId);
}

function deletePlanEditorSchritt(idx) {
  planEditorState.schritte.splice(idx, 1);
  const titel = document.getElementById('plan-editor-titel')?.value || '';
  renderPlanEditorModal(titel, document.querySelector('.modal-title')?.textContent || '', !!planEditorState.planId);
}

function addPlanEditorSchritt() {
  const inp = document.getElementById('neuer-schritt-input');
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) return;
  planEditorState.schritte.push({ id: genId(), text: text, erledigt: false, istNeu: true });
  const titel = document.getElementById('plan-editor-titel')?.value || '';
  renderPlanEditorModal(titel, document.querySelector('.modal-title')?.textContent || '', !!planEditorState.planId);
  // Fokus auf neues Input setzen
  setTimeout(() => document.getElementById('neuer-schritt-input')?.focus(), 50);
}

function savePlanEditor() {
  const planTitel = (document.getElementById('plan-editor-titel')?.value || '').trim();
  if (!planTitel) { showToast('Bitte Plan-Titel eingeben'); return; }

  // Schritt-Texte aus Inputs lesen (aktueller DOM-Zustand)
  document.querySelectorAll('.plan-modal-schritt input').forEach((inp, idx) => {
    if (planEditorState.schritte[idx]) planEditorState.schritte[idx].text = inp.value.trim();
  });

  // Leere Schritte entfernen
  planEditorState.schritte = planEditorState.schritte.filter(s => s.text);
  if (planEditorState.schritte.length === 0) { showToast('Mindestens ein Schritt nötig'); return; }

  const zettel = getAktuellerZettel();
  if (!zettel) return;

  if (planEditorState.planId) {
    // Bestehenden Plan aktualisieren
    const plan = zettel.eintraege.find(e => e.planId === planEditorState.planId && e.istPlan);
    if (plan) {
      plan.text = planTitel;
      plan.planTitel = planTitel;
    }
    // Bestehende Schritte aktualisieren / neue hinzufügen
    const vorhandeneIds = new Set(planEditorState.schritte.filter(s => !s.istNeu).map(s => s.id));
    // Gelöschte Schritte entfernen
    zettel.eintraege = zettel.eintraege.filter(e =>
      !(e.planId === planEditorState.planId && e.istSchritt && !vorhandeneIds.has(e.id))
    );
    // Schritte aktualisieren oder neu anlegen
    planEditorState.schritte.forEach((s, idx) => {
      if (s.istNeu) {
        zettel.eintraege.push(neuerSchritteintrag(s.text, s.erledigt, planEditorState.planId, planTitel, planEditorState.abschnitt, 1000 + idx));
      } else {
        const existing = zettel.eintraege.find(e => e.id === s.id);
        if (existing) { existing.text = s.text; existing.erledigt = s.erledigt; existing.reihenfolge = 1000 + idx; }
      }
    });
  } else {
    // Neuer Plan aus Aufgabe hochstufen
    const planId = genId();
    const aufgabe = planEditorState.aufgabeId ? zettel.eintraege.find(e => e.id === planEditorState.aufgabeId) : null;
    const basisReihenfolge = aufgabe ? aufgabe.reihenfolge : 0;

    // Plan-Hauptzeile
    zettel.eintraege.push({
      id: genId(), typ: 'plan', text: planTitel, erledigt: false, zusatz: '',
      quelle: aufgabe ? aufgabe.quelle : 'frei',
      refId: null, planId: planId, planTitel: planTitel, miniplanId: null,
      istPlan: true, istSchritt: false, abschnitt: planEditorState.abschnitt,
      reihenfolge: basisReihenfolge - 0.5,
      transferiert: false, transferAktion: null,
      kennzeichen: { urgent: false, unclear: false, idea: false },
      groesse: null, deadline: null, terminDaten: null
    });

    // Ursprüngliche Aufgabe zum Schritt machen (oder neue Schritte)
    planEditorState.schritte.forEach((s, idx) => {
      if (!s.istNeu && aufgabe && s.id === aufgabe.id) {
        // Aufgabe umwandeln
        aufgabe.istSchritt = true; aufgabe.istPlan = false;
        aufgabe.planId = planId; aufgabe.planTitel = planTitel;
        aufgabe.reihenfolge = basisReihenfolge + idx;
      } else {
        zettel.eintraege.push(neuerSchritteintrag(s.text, s.erledigt, planId, planTitel, planEditorState.abschnitt, basisReihenfolge + idx));
      }
    });

    // Reihenfolge normalisieren
    const imAbschnitt = zettel.eintraege
      .filter(x => x.abschnitt === planEditorState.abschnitt)
      .sort((a, b) => a.reihenfolge - b.reihenfolge);
    imAbschnitt.forEach((x, i) => { x.reihenfolge = i; });
  }

  saveDB();
  closeModal();
  renderZettel();
  showToast('✓ Plan gespeichert');
}

function neuerSchritteintrag(text, erledigt, planId, planTitel, abschnitt, reihenfolge) {
  return {
    id: genId(), typ: 'aufgabe', text: text, erledigt: erledigt, zusatz: '',
    quelle: 'frei', refId: null, planId: planId, planTitel: planTitel, miniplanId: null,
    istPlan: false, istSchritt: true, abschnitt: abschnitt, reihenfolge: reihenfolge,
    transferiert: false, transferAktion: null,
    kennzeichen: { urgent: false, unclear: false, idea: false },
    groesse: null, deadline: null, terminDaten: null
  };
}

function deletePlan(planId) {
  if (!confirm('Plan und alle Schritte löschen?')) return;
  const zettel = getAktuellerZettel();
  if (!zettel) return;
  zettel.eintraege = zettel.eintraege.filter(e => e.planId !== planId);
  saveDB();
  closeModal();
  renderZettel();
  showToast('Plan gelöscht');
}

function toggleSig(typ) {

}

function toggleSize(s) {
  ['S','M','L'].forEach(x => {
    const b = document.getElementById('size-' + x);
    if (b) b.classList.toggle('on', x === s && !b.classList.contains('on'));
  });
  // Wenn gleiche Größe nochmal gedrückt: deselect
  const btn = document.getElementById('size-' + s);
  if (btn && !btn.classList.contains('on')) {
    // war schon on, wurde deaktiviert – ok
  }
}

function leseKennzeichen() {
  return {
    urgent:  document.getElementById('sig-urgent')?.classList.contains('on')  ?? false,
    unclear: document.getElementById('sig-unclear')?.classList.contains('on') ?? false,
    idea:    document.getElementById('sig-idea')?.classList.contains('on')    ?? false
  };
}

function leseGroesse() {
  for (const s of ['S','M','L']) {
    if (document.getElementById('size-' + s)?.classList.contains('on')) return s;
  }
  return null;
}

const PLANER_SCHRITTE = [
  { nr: 1, titel: 'Berufliche Aufgaben',  sub: 'Wähle was heute dran ist – oder überspringe',     ueberspringbar: true,  typ: 'aufgaben', quelle: 'work' },
  { nr: 2, titel: 'Berufliche Termine',   sub: 'Trage Termine ein und setze Erinnerungen',         ueberspringbar: true,  typ: 'termine',  quelle: 'work' },
  { nr: 3, titel: 'Private Aufgaben',     sub: 'Wähle private Aufgaben – leer lassen ist ok',      ueberspringbar: false, typ: 'aufgaben', quelle: 'priv' },
  { nr: 4, titel: 'Private Termine',      sub: 'Trage private Termine ein',                        ueberspringbar: false, typ: 'termine',  quelle: 'priv' },
  { nr: 5, titel: 'Exportieren & Starten', sub: 'Tagesfile erstellen – sicher für den Firmen-PC', ueberspringbar: false, typ: 'export',   quelle: null   },
];

function openPlaner() {
  state.planerSchritt = 1;
  state.planerAusgewaehlt = [];
  state.planerTermine = [];
  state.planerPlanAufgeklappt = {};
  renderPlaner();
  showScreen('planer');
  setBadge('morgen', 'badge-morning');
}

function openTagesfileImport() {
  document.getElementById('planer-tagesfile-input').click();
}

function planerTagesfileGeladen(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const text = e.target.result.replace(/^\uFEFF/, '');
      const data = JSON.parse(text);
      if (data.typ !== 'daypaper-tagesfile') {
        showToast('⚠️ Keine gültige DayPaper Tagesfile');
        return;
      }
      // Datumsvergleich
      const heute = todayISO();
      if (data.datum && data.datum !== heute) {
        if (!confirm(`Die Datei ist vom ${formatDate(data.datum)} – trotzdem laden?`)) return;
      }
      // Tagesfile direkt als Zettel verwenden
      tagesfileAlsZettelAnlegen(data);
    } catch(err) {
      showToast('⚠️ Datei konnte nicht gelesen werden');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function tagesfileAlsZettelAnlegen(data) {
  const heute = data.datum || todayISO();
  let eintraege = [];
  let reihenfolge = 0;

  // Aufgaben
  (data.aufgaben || []).forEach(a => {
    eintraege.push({
      id: genId(), typ: 'aufgabe', text: a.titel, erledigt: false, zusatz: '',
      quelle: a.quelle || 'frei', refId: a.refId || null,
      planId: null, planTitel: a.planTitel || null,
      istPlan: false, istSchritt: false,
      abschnitt: 'aufgaben', reihenfolge: reihenfolge++,
      transferiert: false, transferAktion: null,
      kennzeichen: { urgent: false, unclear: false, idea: false },
      groesse: a.groesse || null, deadline: a.faellig || null, terminDaten: null
    });
  });

  // Termine
  (data.termine || []).forEach(t => {
    eintraege.push({
      id: genId(), typ: 'termin', text: t.titel, erledigt: false, zusatz: '',
      quelle: t.quelle || 'frei', refId: null,
      planId: null, planTitel: null,
      istPlan: false, istSchritt: false,
      abschnitt: 'termine', reihenfolge: reihenfolge++,
      transferiert: false, transferAktion: null,
      kennzeichen: { urgent: false, unclear: false, idea: false },
      groesse: null, deadline: null,
      terminDaten: { start: t.start || null, ende: t.ende || null, ort: t.ort || null, erinnerung: t.erinnerung || null, erinnerungAktiv: t.erinnerungAktiv || false }
    });
  });

  const zettel = {
    id: genId(), datum: heute, status: 'aktiv',
    eintraege: eintraege,
    quellen: { work: null, priv: null },
    erstelltAm: new Date().toISOString(), uebertragAm: null
  };
  DB.tageszettel.push(zettel);
  state.activeZettelId = zettel.id;
  saveDB();
  showToast('✓ Tagesfile geladen – Zettel bereit');
  openZettel(zettel.id);
}

// ── Planer rendern ──────────────────────────────────
function renderPlaner() {
  const schritt = PLANER_SCHRITTE[state.planerSchritt - 1];

  // Stepper
  let stepperHtml = '';
  PLANER_SCHRITTE.forEach((s, i) => {
    const nr = i + 1;
    const cls = nr < state.planerSchritt ? 'done' : nr === state.planerSchritt ? 'active' : '';
    if (i > 0) stepperHtml += `<div class="ps-line${nr <= state.planerSchritt ? ' done' : ''}"></div>`;
    stepperHtml += `<div class="ps-dot ${cls}">${cls === 'done' ? '✓' : nr}</div>`;
  });
  document.getElementById('planer-stepper').innerHTML = stepperHtml;

  // Titel
  document.getElementById('planer-step-title').textContent = schritt.titel;
  document.getElementById('planer-step-sub').textContent = schritt.sub;

  // Footer
  const skipBtn = document.getElementById('planer-btn-skip');
  const infoEl  = document.getElementById('planer-step-info');
  skipBtn.style.display = schritt.ueberspringbar ? '' : 'none';
  infoEl.textContent = `${state.planerSchritt} / 5`;
  document.getElementById('planer-btn-weiter').textContent =
    state.planerSchritt === 5 ? '↓ Exportieren' : 'Weiter →';

  // Linke Spalte
  if (schritt.typ === 'aufgaben') renderPlanerAufgaben(schritt.quelle);
  else if (schritt.typ === 'termine') renderPlanerTermine(schritt.quelle);
  else if (schritt.typ === 'export') renderPlanerExport();

  // Rechte Spalte
  renderPlanerZettelVorschau();
}

// ── Aufgaben-Schritt ────────────────────────────────
function renderPlanerAufgaben(quelle) {
  const scroll = document.getElementById('planer-left-scroll');
  const heute = todayISO();

  if (!state.quellen[quelle]) {
    const btnLabel = quelle === 'work' ? '📁 Beruflich laden' : '📁 Privat laden';
    const btnCls   = quelle === 'work' ? 'work' : 'priv';
    scroll.innerHTML = `
      <div style="padding:12px;">
        <div class="morgen-sources" style="margin-bottom:12px;">
          <button class="src-btn ${btnCls}" onclick="planerLoadSource('${quelle}')">${btnLabel}</button>
        </div>
        <div class="morgen-empty" style="padding:24px;text-align:center;color:#a09080;">
          <div style="font-size:28px;">📁</div>
          <div style="margin-top:8px;font-size:12px;">Backlog laden um Aufgaben auszuwählen</div>
        </div>
      </div>`;
    return;
  }

  // Aufgaben holen – gleiche Logik wie getAlleAufgaben aber nur für eine Quelle
  const data = state.quellen[quelle].daten;
  const planAufgabeIds = new Set();
  if (data.plaene) {
    data.plaene.forEach(p => {
      if (p.status === 'erledigt' || p.status === 'abgeschlossen') return;
      (p.schritte || []).forEach(s => { if (s.aufgabeId && !s.erledigt) planAufgabeIds.add(s.aufgabeId); });
    });
  }

  const aufgaben = (data.aufgaben || []).filter(a => {
    if (a.erledigt || a.status === 'erledigt') return false;
    const start = a.anzeigedatum || a.startdatum || a.wiedervorlage || null;
    if (start && start > heute) return false;
    if (planAufgabeIds.has(a.id)) return false;
    return true;
  }).map(a => ({
    refId: a.id, quelle, titel: a.titel,
    faellig: a.faellig || null, zeitnah: !!(a.zeitnah || a.istZeitnah),
    groesse: a.groesse || null, wiederholung: wiederholungText(a.wiederholung),
    planTitel: null
  })).sort((a, b) => morgenSortPrio(a, heute) - morgenSortPrio(b, heute));

  const plaene = getAllePlaene().filter(p => p.quelle === quelle);

  let html = `<div class="morgen-sources" style="padding:7px 12px;background:#eee8de;border-bottom:1px solid #d8d0c4;display:flex;gap:7px;">
    <button class="src-btn ${quelle === 'work' ? 'work' : 'priv'}" onclick="planerLoadSource('${quelle}')">📁 Neu laden</button>
    <span class="src-loaded ${quelle === 'work' ? 'sl-w' : 'sl-p'}">✓ Geladen</span>
  </div>`;

  const gruppen = [
    { label: '⚡ Zeitnah · Heute fällig', items: aufgaben.filter(a => morgenSortPrio(a,heute) <= 1) },
    { label: 'Heute fällig',              items: aufgaben.filter(a => morgenSortPrio(a,heute) === 2) },
    { label: 'Demnächst fällig',          items: aufgaben.filter(a => morgenSortPrio(a,heute) === 3) },
    { label: 'Ohne Datum',                items: aufgaben.filter(a => morgenSortPrio(a,heute) === 4) },
    { label: 'Wiederkehrend',             items: aufgaben.filter(a => morgenSortPrio(a,heute) === 5) },
  ];

  gruppen.forEach(g => {
    if (g.items.length === 0) return;
    html += `<div class="morgen-prio-head">${g.label}</div>`;
    g.items.forEach(a => {
      const isSel = state.planerAusgewaehlt.some(x => x.refId === a.refId && x.quelle === a.quelle);
      let meta = '';
      if (a.zeitnah)    meta += `<span class="pm pm-zeitnah">⚡ zeitnah</span>`;
      if (a.faellig && a.faellig <= heute) meta += `<span class="pm pm-dl-heute">⚑ heute</span>`;
      else if (a.faellig) meta += `<span class="pm pm-dl">⚑ ${a.faellig.slice(8)}.${a.faellig.slice(5,7)}.</span>`;
      if (a.groesse)    meta += `<span class="pm pm-sz">${escHtml(a.groesse)}</span>`;
      if (a.wiederholung) meta += `<span class="pm pm-rec">${escHtml(a.wiederholung)}</span>`;
      html += `<div class="pick-row${isSel ? ' sel' : ''}" onclick="planerToggleAufgabe('${a.refId}','${quelle}')">
        <div class="pick-arrow" style="pointer-events:none;">${isSel ? '✓' : '→'}</div>
        <div class="pick-body" style="pointer-events:none;">
          <div class="pick-title-new${a.zeitnah ? ' zeitnah' : ''}">${escHtml(a.titel)}</div>
          ${meta ? `<div class="pick-meta-new">${meta}</div>` : ''}
        </div>
      </div>`;
    });
  });

  // Plan-Blöcke
  if (plaene.length > 0) {
    html += `<div class="morgen-plan-section">Pläne</div>`;
    plaene.forEach(p => {
      const aufg = !!state.planerPlanAufgeklappt[p.planId];
      html += `<div class="morgen-plan-block">
        <div class="morgen-plan-header" onclick="togglePlanerPlan('${p.planId}')">
          <span class="morgen-plan-toggle">${aufg ? '▼' : '▶'}</span>
          <span class="morgen-plan-icon">📋</span>
          <span class="morgen-plan-titel">${escHtml(p.titel)}</span>
          <span class="morgen-plan-meta">${p.schritte.length} offen</span>
        </div>`;
      if (aufg) {
        p.schritte.forEach((s, si) => {
          const key = p.planId + '|' + s.schrittIdx;
          const isSel = state.planerAusgewaehlt.some(x => x.planSchrittKey === key);
          window._dpPSM[window._dpPSIdx] = { planId: p.planId, schrittIdx: s.schrittIdx, quelle };
          const idx = window._dpPSIdx++;
          html += `<div class="morgen-plan-schritt${isSel ? ' sel' : ''}" onclick="window.dpKlickSchrittPlaner(${idx})" style="pointer-events:auto;">
            <div class="mps-arrow" style="pointer-events:none;">${isSel ? '✓' : '→'}</div>
            <div class="mps-body" style="pointer-events:none;">
              <div class="mps-titel">${escHtml(s.aufgabeTitel || s.titel)}</div>
            </div>
          </div>`;
        });
      }
      html += `</div>`;
    });
  }

  if (html.indexOf('pick-row') < 0 && plaene.length === 0) {
    html += `<div class="morgen-empty" style="padding:24px;text-align:center;color:#a09080;font-size:12px;">Keine offenen Aufgaben</div>`;
  }

  scroll.innerHTML = html;
}

window.dpKlickSchrittPlaner = function(idx) {
  const entry = window._dpPSM[idx];
  if (!entry) return;
  planerTogglePlanSchritt(entry.planId, entry.schrittIdx, entry.quelle);
};

function planerToggleAufgabe(refId, quelle) {
  const data = state.quellen[quelle]?.daten;
  const a = (data?.aufgaben || []).find(x => x.id === refId);
  if (!a) return;
  const existing = state.planerAusgewaehlt.findIndex(x => x.refId === refId && x.quelle === quelle);
  if (existing >= 0) {
    state.planerAusgewaehlt.splice(existing, 1);
  } else {
    state.planerAusgewaehlt.push({
      refId, quelle, titel: a.titel,
      faellig: a.faellig || null, zeitnah: !!(a.zeitnah || a.istZeitnah),
      groesse: a.groesse || null, planTitel: null, istPlanSchritt: false
    });
  }
  renderPlaner();
}

function planerTogglePlanSchritt(planId, schrittIdx, quelle) {
  const key = planId + '|' + schrittIdx;
  const existing = state.planerAusgewaehlt.findIndex(x => x.planSchrittKey === key);
  if (existing >= 0) {
    state.planerAusgewaehlt.splice(existing, 1);
    renderPlaner(); return;
  }
  const data = state.quellen[quelle]?.daten;
  const plan = data?.plaene?.find(p => p.id === planId);
  const schritt = (plan?.schritte || [])[schrittIdx];
  if (!schritt || !plan) return;
  const aufgabenMap = {};
  (data.aufgaben || []).forEach(a => { aufgabenMap[a.id] = a; });
  const aufgabe = schritt.aufgabeId ? aufgabenMap[schritt.aufgabeId] : null;
  state.planerAusgewaehlt.push({
    refId: aufgabe ? aufgabe.id : null, quelle,
    titel: aufgabe ? aufgabe.titel : schritt.titel,
    planTitel: plan.titel, planId, planSchrittKey: key,
    schrittIdx, faellig: aufgabe?.faellig || null,
    zeitnah: !!(aufgabe?.zeitnah || aufgabe?.istZeitnah),
    groesse: aufgabe?.groesse || null, istPlanSchritt: true
  });
  renderPlaner();
}

function togglePlanerPlan(planId) {
  state.planerPlanAufgeklappt[planId] = !state.planerPlanAufgeklappt[planId];
  renderPlaner();
}

function planerLoadSource(quelle) {
  if (window.showOpenFilePicker) {
    window.showOpenFilePicker({ types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }] })
      .then(([fh]) => fh.getFile()).then(f => f.text()).then(text => planerSourceVerarbeiten(text, quelle))
      .catch(() => {});
  } else {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.json';
    inp.onchange = e => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = x => planerSourceVerarbeiten(x.target.result, quelle); r.readAsText(f); } };
    inp.click();
  }
}

function planerSourceVerarbeiten(text, quelle) {
  try {
    const clean = text.replace(/^\uFEFF/, '');
    const daten = JSON.parse(clean);
    if (!daten.aufgaben && !daten.plaene) { showToast('⚠️ Keine gültige Backlog-Datei'); return; }
    state.quellen[quelle] = { name: quelle === 'work' ? 'Beruflich' : 'Privat', daten };
    showToast(quelle === 'work' ? '✓ Beruflich geladen' : '✓ Privat geladen');
    renderPlaner();
  } catch { showToast('⚠️ Datei konnte nicht gelesen werden'); }
}

// ── Termin-Schritt ───────────────────────────────────
function renderPlanerTermine(quelle) {
  const scroll = document.getElementById('planer-left-scroll');
  const termine = state.planerTermine.filter(t => t.quelle === quelle);

  let terminListHtml = '';
  termine.forEach((t, i) => {
    const zeitStr = t.start ? (t.start + (t.ende ? '–' + t.ende : '')) : '–';
    terminListHtml += `<div class="planer-termin-item">
      <span class="pti-time">${zeitStr}</span>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(t.titel)}</span>
      ${t.erinnerungAktiv ? '<span class="pti-bell">🔔</span>' : ''}
      <span class="pti-del" onclick="planerDeleteTermin('${t.id}')">×</span>
    </div>`;
  });

  // Erinnerungs-Box für Termine ohne Erinnerung
  const ohneErin = termine.filter(t => !t.erinnerungAktiv && t.start);
  let erinHtml = '';
  if (ohneErin.length > 0) {
    erinHtml = `<div class="planer-erin-box">
      <h4>🔔 Erinnerungen setzen?</h4>
      ${ohneErin.map(t => `<div class="peb-row">
        <div class="peb-cb" onclick="planerToggleErinnerung('${t.id}')"></div>
        <span>${escHtml(t.titel)}</span>
        <span class="peb-time">${planerErinnerungszeit(t.start)}</span>
      </div>`).join('')}
    </div>`;
  }

  // Neue Termin-ID für Form
  const neuId = 'pt_' + Date.now();

  scroll.innerHTML = `
    ${terminListHtml ? `<div class="planer-termin-list">${terminListHtml}</div>` : ''}
    <div class="planer-termin-form">
      <div class="ptf-label">Neuer Termin</div>
      <input class="ptf-input" id="ptf-titel-${quelle}" placeholder="Termin-Titel …">
      <div class="ptf-row">
        <div><div class="ptf-label">Start</div><input class="ptf-input" id="ptf-start-${quelle}" type="time"></div>
        <div><div class="ptf-label">Ende</div><input class="ptf-input" id="ptf-ende-${quelle}" type="time"></div>
      </div>
      <div><div class="ptf-label">Ort (optional)</div><input class="ptf-input" id="ptf-ort-${quelle}" placeholder="Raum, Teams …"></div>
      <button class="btn-add-termin" onclick="planerAddTermin('${quelle}')">＋ Hinzufügen</button>
    </div>
    ${erinHtml}`;
}

function planerErinnerungszeit(start) {
  if (!start) return '';
  const [h, m] = start.split(':').map(Number);
  const total = h * 60 + m - 15;
  const eh = Math.floor(total / 60), em = total % 60;
  return `${String(eh).padStart(2,'0')}:${String(em < 0 ? 0 : em).padStart(2,'0')}`;
}

function planerAddTermin(quelle) {
  const titel = document.getElementById(`ptf-titel-${quelle}`)?.value.trim();
  if (!titel) { showToast('Bitte Titel eingeben'); return; }
  const start = document.getElementById(`ptf-start-${quelle}`)?.value || null;
  const ende  = document.getElementById(`ptf-ende-${quelle}`)?.value || null;
  const ort   = document.getElementById(`ptf-ort-${quelle}`)?.value.trim() || null;
  state.planerTermine.push({
    id: 'pt_' + Date.now(), titel, start, ende, ort,
    erinnerung: start ? planerErinnerungszeit(start) : null,
    erinnerungAktiv: false, quelle
  });
  renderPlaner();
}

function planerDeleteTermin(id) {
  state.planerTermine = state.planerTermine.filter(t => t.id !== id);
  renderPlaner();
}

function planerToggleErinnerung(id) {
  const t = state.planerTermine.find(x => x.id === id);
  if (t) { t.erinnerungAktiv = !t.erinnerungAktiv; renderPlaner(); }
}

// ── Export-Schritt ──────────────────────────────────
function renderPlanerExport() {
  const scroll = document.getElementById('planer-left-scroll');
  const aufgB = state.planerAusgewaehlt.filter(a => a.quelle === 'work' && !a.istPlanSchritt).length;
  const aufgP = state.planerAusgewaehlt.filter(a => a.quelle === 'priv' && !a.istPlanSchritt).length;
  const termB = state.planerTermine.filter(t => t.quelle === 'work').length;
  const termP = state.planerTermine.filter(t => t.quelle === 'priv').length;
  const planS = state.planerAusgewaehlt.filter(a => a.istPlanSchritt).length;
  const gesamt = aufgB + aufgP + termB + termP + planS;

  const warnungen = [];
  if (termP === 0) warnungen.push('Keine privaten Termine – du kannst sie im Tageszettel ergänzen.');
  if (termB === 0 && aufgB > 0) warnungen.push('Keine beruflichen Termine eingetragen.');
  if (gesamt === 0) warnungen.push('Dein Zettel ist leer – eine leere Datei ist trotzdem gültig.');

  scroll.innerHTML = `<div class="planer-export">
    <div class="pe-summary">
      <h4>Zusammenfassung</h4>
      <div class="pe-row">Berufliche Aufgaben <span>${aufgB}</span></div>
      <div class="pe-row">Berufliche Termine <span>${termB}</span></div>
      <div class="pe-row">Private Aufgaben <span>${aufgP}</span></div>
      <div class="pe-row">Private Termine <span>${termP}</span></div>
      <div class="pe-row">Plan-Schritte <span>${planS}</span></div>
    </div>
    ${warnungen.map(w => `<div class="pe-warn">⚠️ ${w}</div>`).join('')}
    <div class="pe-hint">🔒 Nur deine Tagesauswahl – keine vollständigen Backlog-Daten. Sicher für den Firmen-PC.</div>
    <div class="pe-question">
      <p>Direkt als Tageszettel starten?</p>
      <div class="pe-sub">Oder Tagesfile exportieren für ein anderes Gerät (iPad)</div>
      <div class="pe-btns">
        <button class="pe-yes" onclick="planerZettelStarten()">✦ Ja, Zettel starten</button>
        <button class="pe-no"  onclick="planerExportieren()">↓ Nur exportieren</button>
      </div>
    </div>
  </div>`;
}

// ── Zettel-Vorschau rechts ──────────────────────────
function renderPlanerZettelVorschau() {
  const scroll = document.getElementById('planer-right-scroll');
  const heute = todayISO();
  const aufgaben = state.planerAusgewaehlt;
  const termine  = state.planerTermine;
  const gesamt = aufgaben.length + termine.length;

  document.getElementById('planer-zettel-count').textContent = gesamt + ' Einträge';

  let html = '';

  // Aufgaben
  html += `<div class="zv-section">Aufgaben</div>`;
  if (aufgaben.length === 0) {
    html += `<div class="zv-empty">noch keine Aufgaben</div>`;
  } else {
    aufgaben.forEach(a => {
      html += `<div class="zv-row">
        <div class="zv-cb"></div>
        <div class="zv-text">${escHtml(a.titel)}</div>
        <div class="zv-right">${a.zeitnah ? '<span class="zv-pill zvp-zn">!</span>' : ''}${a.planTitel ? '<span class="zv-pill zvp-pl">Plan</span>' : ''}</div>
      </div>`;
    });
  }

  // Termine
  html += `<div class="zv-section">Termine</div>`;
  const termSort = [...termine].sort((a,b) => (a.start||'').localeCompare(b.start||''));
  if (termSort.length === 0) {
    const schritt = state.planerSchritt;
    html += `<div class="zv-empty">${schritt <= 2 ? 'folgt in Schritt 2 →' : schritt <= 4 ? 'noch keine Termine' : 'keine Termine geplant'}</div>`;
  } else {
    termSort.forEach(t => {
      html += `<div class="zv-row">
        <div class="zv-time">${t.start || ''}</div>
        <div class="zv-text">${escHtml(t.titel)}${t.erinnerungAktiv ? ' 🔔' : ''}</div>
        <div class="zv-right"></div>
      </div>`;
    });
  }

  scroll.innerHTML = html;
}

// ── Navigation ─────────────────────────────────────
function planerWeiter(ueberspringen) {
  const schritt = PLANER_SCHRITTE[state.planerSchritt - 1];

  // Export-Schritt: direkt über Export-Buttons
  if (schritt.typ === 'export') return;

  // Hinweis wenn Termin-Schritt übersprungen und Termine vorhanden wären
  if (ueberspringen && schritt.typ === 'termine') {
    showToast('ℹ️ Keine Termine eingetragen – du kannst sie im Zettel ergänzen');
  }

  if (state.planerSchritt < 5) {
    state.planerSchritt++;
    renderPlaner();
  }
}

// ── Export & Zettel anlegen ─────────────────────────
function planerExportTagesfile() {
  const heute = todayISO();
  const tagesfile = {
    typ: 'daypaper-tagesfile', datum: heute,
    exportiert: new Date().toISOString(),
    aufgaben: state.planerAusgewaehlt.map(a => ({
      titel: a.titel, refId: a.refId || null,
      quelle: a.quelle, faellig: a.faellig || null,
      zeitnah: a.zeitnah, groesse: a.groesse || null,
      planTitel: a.planTitel || null, istPlanSchritt: a.istPlanSchritt || false
    })),
    termine: state.planerTermine.map(t => ({
      titel: t.titel, start: t.start, ende: t.ende, ort: t.ort,
      erinnerung: t.erinnerung, erinnerungAktiv: t.erinnerungAktiv, quelle: t.quelle
    }))
  };
  return tagesfile;
}

function planerExportieren() {
  const data = planerExportTagesfile();
  const d = new Date();
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const jj = d.getFullYear();
  const dateiname = `${dd}${mm}${jj}_daypaper_tagesfile.json`;
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = dateiname;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast(`✓ ${dateiname} exportiert`);
}

function planerZettelStarten() {
  const data = planerExportTagesfile();
  // Auch exportieren (für iPad-Workflow)
  planerExportieren();
  // Direkt als Zettel anlegen
  tagesfileAlsZettelAnlegen(data);
}


// ═══════════════════════════════════════════════════
// REMARKABLE PDF EXPORT
// Remarkable Paper Pro Move – 8 Zoll: 157.5 × 209.9 mm
// ═══════════════════════════════════════════════════
function exportRemarkablePDF() {
  const zettel = getAktuellerZettel();
  if (!zettel) { showToast('Kein aktiver Zettel'); return; }

  if (typeof window.jspdf === 'undefined') {
    showToast('⚠️ PDF-Bibliothek lädt noch – bitte kurz warten');
    return;
  }

  const { jsPDF } = window.jspdf;

  // Remarkable Paper Pro Move 8": 157.5 × 209.9 mm
  const W = 157.5;
  const H = 209.9;

  const doc = new jsPDF({
    orientation: 'portrait',
    unit: 'mm',
    format: [W, H]
  });

  // ── Maße ──────────────────────────────────────
  const MARGIN_L = 10;
  const MARGIN_R = 10;
  const MARGIN_T = 12;
  const TEXT_W   = W - MARGIN_L - MARGIN_R;
  const ZEILEN_H = 8.125;  // +25% von 6.5
  const KARO_H   = 8.125;
  const KARO_W   = 6.25;   // +25% von 5

  let y = MARGIN_T;

  // ── Hilfsfunktionen ───────────────────────────
  function neueSeite() {
    doc.addPage([W, H]);
    y = MARGIN_T;
    zeichneHintergrund();
  }

  function pruefeUmbruch(benoetigt) {
    if (y + benoetigt > H - 8) { neueSeite(); return true; }
    return false;
  }

  function zeichneHintergrund() {
    // Karo-Raster etwas dunkler (war 210/215/225 → jetzt 175/182/195)
    doc.setDrawColor(175, 182, 195);
    doc.setLineWidth(0.2);

    // Horizontale Linien – über die gesamte Breite, kein Rand ausgespart
    for (let ly = MARGIN_T; ly < H - 4; ly += KARO_H) {
      doc.line(MARGIN_L, ly, W - MARGIN_R, ly);
    }
    // Vertikale Linien
    for (let lx = MARGIN_L; lx <= W - MARGIN_R; lx += KARO_W) {
      doc.line(lx, MARGIN_T, lx, H - 4);
    }
    // Keine rote Marginallinie mehr
  }

  function schreibeAbschnittTitel(titel) {
    pruefeUmbruch(10);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8.75); // +25% von 7
    doc.setTextColor(180, 30, 30);
    doc.text(titel.toUpperCase(), MARGIN_L + 1, y + 5);
    y += ZEILEN_H;
  }

  function schreibeAufgabe(text, erledigt, zusatz, groesse, istSchritt) {
    const einzug  = istSchritt ? 8 : 2;
    const cbX     = MARGIN_L + einzug;
    const textX   = cbX + 6;
    const maxW    = W - MARGIN_R - textX - 1;

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(istSchritt ? 11.25 : 12.5); // +25% von 9/10

    let anzeige = text;
    if (groesse) anzeige += ` (${groesse} min)`;
    const zeilen = doc.splitTextToSize(anzeige, maxW);
    const hoehe  = zeilen.length * ZEILEN_H;
    pruefeUmbruch(hoehe + 1);

    // Checkbox
    const cbY = y + 1.5;
    doc.setDrawColor(120, 100, 80);
    doc.setLineWidth(0.5);
    if (istSchritt) {
      doc.rect(cbX, cbY, 4, 4);
    } else {
      doc.rect(cbX, cbY, 5, 5);
    }
    if (erledigt) {
      doc.setDrawColor(60, 60, 60);
      doc.setLineWidth(0.6);
      doc.line(cbX + 0.6, cbY + 2.5, cbX + 1.8, cbY + 4);
      doc.line(cbX + 1.8, cbY + 4, cbX + 4.4, cbY + 0.6);
    }

    // Text
    doc.setTextColor(erledigt ? 140 : 25, erledigt ? 130 : 16, erledigt ? 110 : 10);
    zeilen.forEach((z, i) => {
      if (i > 0) pruefeUmbruch(ZEILEN_H);
      doc.text(z, textX, y + 5.5);
      if (erledigt) {
        const tw = doc.getTextWidth(z);
        doc.setLineWidth(0.35);
        doc.setDrawColor(140, 130, 110);
        doc.line(textX, y + 4, textX + tw, y + 4);
      }
      if (i < zeilen.length - 1) y += ZEILEN_H;
    });

    y += ZEILEN_H;

    // Zusatz
    if (zusatz) {
      pruefeUmbruch(ZEILEN_H);
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(10); // +25% von 8
      doc.setTextColor(100, 88, 72);
      const zusatzZeilen = doc.splitTextToSize(zusatz, maxW);
      zusatzZeilen.forEach(z => {
        pruefeUmbruch(ZEILEN_H);
        doc.text(z, textX + 2, y + 5);
        y += ZEILEN_H;
      });
    }
  }

  function schreibeTermin(text, start, ende, ort, erinnerungAktiv) {
    pruefeUmbruch(ZEILEN_H + 1);
    const zeitStr = start ? (start + (ende ? '–' + ende : '')) : '';
    const titelX  = MARGIN_L + 8 + (zeitStr ? doc.getStringUnitWidth(zeitStr) * 11.25 / doc.internal.scaleFactor + 3 : 0);
    const maxW    = W - MARGIN_R - titelX - 1;

    // Checkbox
    doc.setDrawColor(70, 70, 100);
    doc.setLineWidth(0.5);
    doc.rect(MARGIN_L + 2, y + 1.5, 5, 5);

    // Zeit fett
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11.25); // +25% von 9
    doc.setTextColor(50, 50, 100);
    const zeitX = MARGIN_L + 9;
    if (zeitStr) doc.text(zeitStr, zeitX, y + 5.5);
    const zeitBreite = zeitStr ? doc.getTextWidth(zeitStr) + 2 : 0;

    // Titel
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(12.5); // +25% von 10
    doc.setTextColor(40, 35, 60);
    const tX = zeitX + zeitBreite;
    const titelZeilen = doc.splitTextToSize(text + (erinnerungAktiv ? ' 🔔' : ''), W - MARGIN_R - tX - 1);
    titelZeilen.forEach((z, i) => {
      if (i > 0) pruefeUmbruch(ZEILEN_H);
      doc.text(z, tX, y + 5.5);
      if (i < titelZeilen.length - 1) y += ZEILEN_H;
    });

    y += ZEILEN_H;

    // Ort
    if (ort) {
      pruefeUmbruch(ZEILEN_H - 1);
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(10); // +25% von 8
      doc.setTextColor(90, 85, 110);
      doc.text('📍 ' + ort, MARGIN_L + 11, y + 5);
      y += ZEILEN_H - 1;
    }
  }

  // ── PDF Inhalt ────────────────────────────────
  zeichneHintergrund();

  // Datum
  const datumFormatiert = formatDate(zettel.datum);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(13.75); // +25% von 11
  doc.setTextColor(35, 25, 15);
  doc.text('DayPaper  ·  ' + datumFormatiert, MARGIN_L + 1, y + 1);
  y += ZEILEN_H + 2;

  // ── Aufgaben ──────────────────────────────────
  const aufgaben = zettel.eintraege.filter(e =>
    e.abschnitt === 'aufgaben' && !e.istSchritt
  ).sort((a, b) => (a.reihenfolge ?? 0) - (b.reihenfolge ?? 0));

  if (aufgaben.length > 0) {
    schreibeAbschnittTitel('Aufgaben');
    aufgaben.forEach(e => {
      schreibeAufgabe(e.text, e.erledigt, e.zusatz || '', e.groesse || null, false);
      if (e.istPlan) {
        zettel.eintraege
          .filter(s => s.istSchritt && s.planId === e.planId)
          .sort((a, b) => (a.reihenfolge ?? 0) - (b.reihenfolge ?? 0))
          .forEach(s => schreibeAufgabe(s.text, s.erledigt, '', null, true));
      }
    });
    y += 2;
  }

  // ── Termine ───────────────────────────────────
  const termine = zettel.eintraege.filter(e => e.typ === 'termin')
    .sort((a, b) => (a.terminDaten?.start || '').localeCompare(b.terminDaten?.start || ''));

  if (termine.length > 0) {
    pruefeUmbruch(12);
    schreibeAbschnittTitel('Termine');
    termine.forEach(e => {
      const td = e.terminDaten || {};
      schreibeTermin(e.text, td.start || '', td.ende || '', td.ort || '', td.erinnerungAktiv || false);
    });
    y += 2;
  }

  // ── Notizen ───────────────────────────────────
  const notizen = zettel.eintraege.filter(e => e.typ === 'notiz')
    .sort((a, b) => (a.reihenfolge ?? 0) - (b.reihenfolge ?? 0));

  if (notizen.length > 0) {
    pruefeUmbruch(12);
    schreibeAbschnittTitel('Notizen');
    notizen.forEach(e => {
      pruefeUmbruch(ZEILEN_H);
      doc.setFont('helvetica', 'italic');
      doc.setFontSize(11.875); // +25% von 9.5
      doc.setTextColor(70, 58, 45);
      const zeilen = doc.splitTextToSize('■ ' + e.text, TEXT_W - 4);
      zeilen.forEach(z => {
        pruefeUmbruch(ZEILEN_H);
        doc.text(z, MARGIN_L + 2, y + 5.5);
        y += ZEILEN_H;
      });
    });
  }

  // ── Speichern ─────────────────────────────────
  const d  = new Date(zettel.datum + 'T00:00:00');
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const jj = d.getFullYear();
  doc.save(`${dd}${mm}${jj}_daypaper_remarkable.pdf`);
  showToast('✓ PDF für Remarkable exportiert');
}

</script>

</body>
</html>
