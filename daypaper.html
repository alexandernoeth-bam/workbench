  <title>DayPaper v0.4.3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet">

  <script>
    // App-Höhe sofort setzen (PWA CSS-zoom Bug Vermeidung)
    document.documentElement.style.setProperty('--app-h', window.innerHeight + 'px');
    window.addEventListener('resize', () => {
      document.documentElement.style.setProperty('--app-h', window.innerHeight + 'px');
    });
  </script>

  <style>
    /* ═══════════════════════════════════════
       RESET & ROOT
    ═══════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #28201a;
      color: #20180e;
    }

    :root {
      --app-h: 100%;
      --color-bg:        #ffffff;
      --color-paper:     #ffffff;
      --color-paper-dot: #dde0e8;
      --color-margin:    #ffffff;
      --color-red-line:  #cc2020;
      --color-header:    #28201a;
      --color-header-fg: #c8b89a;
      --color-border:    #d8d0c4;
      --color-muted:     #8a7a68;
      --color-work:      #28201a;
      --color-work-fg:   #c8b89a;
      --color-priv:      #20183a;
      --color-priv-fg:   #b0a8e0;
      --color-plan:      #f0e098;
      --color-plan-fg:   #5a4800;
      --color-note:      #e0e8d8;
      --color-note-fg:   #284018;
      --color-done:      #4a7a5a;
      --color-danger:    #c07070;
      --color-pill-free: #e0dcd6;
      --color-pill-free-fg: #5a5248;
      --margin-width:    130px;
      --handle-width:    24px;
    }

    /* ═══════════════════════════════════════
       APP SHELL
    ═══════════════════════════════════════ */
    #app {
      width: 100%;
      height: var(--app-h);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════
       HEADER
    ═══════════════════════════════════════ */
    #app-header {
      background: var(--color-header);
      padding: 12px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 12px;
    }

    #app-header .title {
      color: var(--color-header-fg);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    #app-header .date {
      color: var(--color-header-fg);
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 1px;
      flex: 1;
      text-align: center;
    }

    #app-header .app-version {
      color: #4a3828;
      font-size: 10px;
      margin-left: 4px;
    }

    .status-badge {
      font-size: 10px;
      padding: 4px 11px;
      border-radius: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }
    .badge-start   { background: #6a6060; color: #f0e8e0; }
    .badge-morning { background: #e8c97a; color: #5a4000; }
    .badge-active  { background: #7ac98a; color: #0a3a18; }
    .badge-transfer{ background: #c97a7a; color: #4a0808; }

    /* ═══════════════════════════════════════
       SCREEN CONTAINER
    ═══════════════════════════════════════ */
    #screen-container {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .screen.active { display: flex; }

    /* ═══════════════════════════════════════
       SCREEN: START
    ═══════════════════════════════════════ */
    #screen-start {
      background: var(--color-bg);
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px 24px;
    }

    .start-logo {
      text-align: center;
    }
    .start-logo h2 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--color-header);
    }
    .start-logo p {
      font-size: 13px;
      color: var(--color-muted);
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .start-card {
      background: white;
      border: 1px solid var(--color-border);
      border-radius: 14px;
      padding: 20px 24px;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .start-card h3 {
      font-size: 13px;
      color: var(--color-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 600;
    }
    .start-card p {
      font-size: 14px;
      color: var(--color-header);
      line-height: 1.5;
    }

    .btn-primary {
      background: var(--color-header);
      color: var(--color-header-fg);
      border: none;
      border-radius: 11px;
      padding: 13px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      width: 100%;
      text-align: center;
    }
    .btn-primary:active { opacity: 0.8; }

    .btn-secondary {
      background: var(--color-border);
      color: #4a3820;
      border: none;
      border-radius: 11px;
      padding: 11px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      text-align: center;
    }
    .btn-secondary:active { opacity: 0.8; }

    .btn-danger {
      background: var(--color-danger);
      color: white;
      border: none;
      border-radius: 11px;
      padding: 11px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      text-align: center;
    }

    /* ═══════════════════════════════════════
       SCREEN: MORGEN (Split-Layout)
    ═══════════════════════════════════════ */
    #screen-morgen { background: var(--color-bg); }

    .morgen-sources {
      background: #eee8de;
      border-bottom: 1px solid var(--color-border);
      padding: 8px 14px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }
    .src-btn {
      flex: 1; border: none; border-radius: 8px;
      padding: 8px 10px; font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .src-btn.work { background: var(--color-work); color: var(--color-work-fg); }
    .src-btn.priv { background: var(--color-priv); color: var(--color-priv-fg); }
    .src-loaded { font-size: 10px; padding: 3px 8px; border-radius: 8px; font-weight: 600; }
    .sl-w { background: var(--color-work); color: var(--color-work-fg); }
    .sl-p { background: var(--color-priv); color: var(--color-priv-fg); }

    /* Split */
    .morgen-split { flex: 1; display: flex; overflow: hidden; }

    /* Linke Spalte */
    .morgen-col-left {
      width: 55%;
      border-right: 1.5px solid #d0c8bc;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #faf6ef;
    }
    .morgen-col-header {
      padding: 7px 12px 6px;
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: #8a7a68; font-weight: 700;
      background: #f0ece4; border-bottom: 1px solid #d8d0c4;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .morgen-col-count { font-size: 10px; color: #a09080; font-weight: 400; letter-spacing: 0; text-transform: none; }

    .morgen-left-scroll { flex: 1; overflow-y: auto; }

    /* Quelle-Trenner (Beruflich / Privat) */
    .morgen-quelle-div {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 12px 5px;
      background: #ede8df; border-bottom: 1px solid #d5cfc4;
      position: sticky; top: 0; z-index: 2;
    }
    .morgen-quelle-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .morgen-quelle-label { font-size: 11px; font-weight: 700; color: #3a3028; flex: 1; }
    .morgen-quelle-count { font-size: 10px; color: #a09080; }

    /* Prioritäts-Gruppe */
    .morgen-prio-head {
      padding: 4px 12px 2px;
      font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
      color: #b0a090; font-weight: 600; background: #f5f0e8;
    }

    /* Pick-Zeile */
    .pick-row {
      display: flex; align-items: flex-start;
      padding: 7px 10px 6px 12px;
      border-bottom: 1px solid #ede8df;
      gap: 8px; cursor: pointer; user-select: none;
    }
    .pick-row:hover { background: #f0ece4; }
    .pick-row.sel   { background: #e8f4ea; }

    .pick-arrow {
      width: 22px; height: 22px;
      border: 1.5px solid #c0b8a8; border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: #9a8a78; margin-top: 1px;
    }
    .pick-row.sel .pick-arrow {
      background: var(--color-done); border-color: var(--color-done);
      color: white; font-size: 11px;
    }

    .pick-body { flex: 1; min-width: 0; }
    .pick-title-new { font-size: 12.5px; color: #20180e; line-height: 1.35; }
    .pick-title-new.zeitnah { font-weight: 700; }
    .pick-meta-new { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; align-items: center; }

    .pm { font-size: 9px; padding: 1px 5px; border-radius: 4px; white-space: nowrap; }
    .pm-zeitnah  { background: #f8d8d8; color: #880000; font-weight: 700; }
    .pm-dl-heute { background: #f4c0b0; color: #5a1800; font-weight: 600; }
    .pm-dl       { background: #fae8d8; color: #7a3800; }
    .pm-sz       { background: #e8e8e8; color: #505050; font-weight: 700; font-family: sans-serif; }
    .pm-plan-new { background: var(--color-plan); color: var(--color-plan-fg); }
    .pm-rec      { background: #d8ecd8; color: #1a5018; }

    /* Rechte Spalte */
    .morgen-col-right {
      flex: 1;
      display: flex; flex-direction: column;
      overflow: hidden; background: #ffffff;
    }
    .morgen-right-header {
      padding: 7px 12px 6px;
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: #c02020; font-weight: 700;
      background: #fff8f8; border-bottom: 1px solid #e8d8d8;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .morgen-right-scroll { flex: 1; overflow-y: auto; }

    .morgen-right-section {
      font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
      color: #a09080; padding: 6px 10px 3px;
      background: #faf6ef; font-weight: 600;
      border-bottom: 1px solid #ede8df;
    }

    .sel-row {
      display: flex; align-items: flex-start;
      padding: 7px 8px 6px 10px;
      border-bottom: 1px solid #f0e8e0; gap: 5px;
    }
    .sel-remove {
      width: 20px; height: 20px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #d09090; cursor: pointer; border-radius: 50%;
    }
    .sel-remove:hover { background: #f8e8e8; color: #c03030; }
    .sel-body { flex: 1; min-width: 0; }
    .sel-title { font-size: 12px; color: #20180e; line-height: 1.35; }
    .sel-sub   { font-size: 10px; color: #9a8a78; margin-top: 2px; }
    .sel-src { font-size: 9px; padding: 1px 5px; border-radius: 4px; display: inline-block; }
    .src-w { background: #28201a; color: #c8b89a; }
    .src-p { background: #20183a; color: #b0a8e0; }

    .morgen-add-hint {
      margin: 6px 10px;
      border: 1px dashed #d0c8bc; border-radius: 7px;
      padding: 6px 10px; font-size: 11px; color: #a09080;
      text-align: center; cursor: pointer;
    }
    .morgen-add-hint:hover { background: #f5f0e8; color: #28201a; }

    /* ═══════════════════════════════════════
       SCREEN: PLANER (Assistent-geführt)
    ═══════════════════════════════════════ */
    #screen-planer { background: var(--color-bg); }

    /* Start-Options */
    .start-options-new {
      display: flex; flex-direction: column; gap: 12px;
      padding: 24px 20px;
    }
    .start-option-new {
      background: white; border: 1.5px solid #d8d0c4;
      border-radius: 14px; padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
    }
    .start-option-new.primary { border-color: #28201a; background: #28201a; }
    .start-option-new:active { opacity: 0.85; }
    .son-icon { font-size: 26px; flex-shrink: 0; }
    .son-body { flex: 1; }
    .son-title { font-size: 14px; font-weight: 700; color: #28201a; }
    .start-option-new.primary .son-title { color: #c8b89a; }
    .son-sub { font-size: 11px; color: #8a7a68; margin-top: 3px; }
    .son-arrow { font-size: 18px; color: #c8b89a; }

    /* Stepper */
    .planer-stepper {
      background: #28201a; padding: 10px 16px;
      display: flex; align-items: center; flex-shrink: 0;
    }
    .ps-dot {
      width: 26px; height: 26px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; flex-shrink: 0;
      border: 2px solid #4a3828; color: #4a3828; background: transparent;
    }
    .ps-dot.done   { background: #4a7a5a; border-color: #4a7a5a; color: white; }
    .ps-dot.active { background: #c8b89a; border-color: #c8b89a; color: #28201a; }
    .ps-line { flex: 1; height: 2px; background: #4a3828; }
    .ps-line.done { background: #4a7a5a; }

    /* Split */
    .planer-split { flex: 1; display: flex; overflow: hidden; }

    /* Linke Spalte */
    .planer-left {
      width: 52%; border-right: 1.5px solid #d0c8bc;
      display: flex; flex-direction: column; overflow: hidden; background: #faf6ef;
    }
    .planer-left-head {
      padding: 9px 14px 7px; background: #f0ece4;
      border-bottom: 1px solid #d8d0c4; flex-shrink: 0;
    }
    .planer-left-title { font-size: 13px; font-weight: 700; color: #28201a; }
    .planer-left-sub   { font-size: 10px; color: #8a7a68; margin-top: 2px; }
    .planer-left-scroll { flex: 1; overflow-y: auto; }

    /* Termin-Formular im Planer */
    .planer-termin-list { padding: 8px 12px 4px; }
    .planer-termin-item {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 8px; background: white;
      border: 1px solid #d8d0c4; border-radius: 7px;
      margin-bottom: 5px; font-size: 11px; color: #28201a;
    }
    .pti-time { font-weight: 700; font-family: sans-serif; min-width: 72px; font-size: 10px; }
    .pti-del  { margin-left: auto; color: #d09090; cursor: pointer; font-size: 16px; line-height: 1; }
    .pti-bell { color: #c8a840; font-size: 12px; }

    .planer-termin-form { padding: 8px 12px; display: flex; flex-direction: column; gap: 7px; }
    .ptf-label { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: #8a7a68; font-weight: 600; margin-bottom: 2px; }
    .ptf-input {
      width: 100%; border: 1px solid #d8d0c4; border-radius: 7px;
      padding: 7px 10px; font-size: 12px; background: white; outline: none;
      font-family: inherit;
    }
    .ptf-row { display: flex; gap: 8px; }
    .ptf-row > div { flex: 1; }
    .btn-add-termin {
      background: #4a7a5a; color: white; border: none;
      border-radius: 7px; padding: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
    }

    /* Erinnerungs-Box */
    .planer-erin-box {
      margin: 8px 12px 12px;
      background: #fff8e8; border: 1.5px solid #e8c97a;
      border-radius: 9px; padding: 10px 12px;
    }
    .planer-erin-box h4 { font-size: 11px; color: #5a4000; margin-bottom: 8px; font-weight: 700; }
    .peb-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; border-bottom: 1px solid #f0e8cc;
      font-size: 11px; color: #3a2a00;
    }
    .peb-row:last-child { border-bottom: none; }
    .peb-cb {
      width: 14px; height: 14px; border-radius: 3px;
      border: 1.5px solid #c8a840; flex-shrink: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 10px;
    }
    .peb-cb.on { background: #c8a840; color: white; }
    .peb-time { margin-left: auto; font-size: 10px; font-family: sans-serif; color: #8a6a00; font-weight: 600; }

    /* Export-Schritt */
    .planer-export { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .pe-summary { background: white; border: 1px solid #d8d0c4; border-radius: 9px; padding: 12px; }
    .pe-summary h4 { font-size: 10px; color: #8a7a68; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .pe-row {
      display: flex; justify-content: space-between; padding: 4px 0;
      border-bottom: 1px solid #f0e8e0; font-size: 12px; color: #28201a;
    }
    .pe-row:last-child { border-bottom: none; }
    .pe-row span { font-weight: 700; color: #4a7a5a; }
    .pe-hint { background: #f0faf4; border: 1px solid #a0d0a8; border-radius: 7px; padding: 8px 10px; font-size: 10px; color: #1a4a22; line-height: 1.5; }
    .pe-warn { background: #fff0e8; border: 1px solid #e8a878; border-radius: 7px; padding: 8px 10px; font-size: 10px; color: #5a2800; line-height: 1.4; }
    .pe-question { background: #28201a; border-radius: 9px; padding: 12px; }
    .pe-question p { font-size: 12px; color: #c8b89a; font-weight: 700; }
    .pe-question .pe-sub { font-size: 10px; color: #6a5840; margin-top: 2px; margin-bottom: 8px; }
    .pe-btns { display: flex; gap: 7px; }
    .pe-yes { flex: 2; background: #c8b89a; color: #28201a; border: none; border-radius: 7px; padding: 9px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .pe-no  { flex: 1; background: rgba(200,184,154,0.12); color: #8a7a68; border: 1px solid #4a3828; border-radius: 7px; padding: 9px; font-size: 11px; cursor: pointer; }

    /* Rechte Spalte: Wachsender Zettel */
    .planer-right {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; background: #ffffff; position: relative;
    }
    .planer-right::after {
      content: ''; position: absolute; top: 0; bottom: 0; right: 70px;
      width: 1.5px; background: #cc2020; pointer-events: none; z-index: 1;
    }
    .planer-right-head {
      padding: 8px 10px 6px; background: #fff8f8;
      border-bottom: 1px solid #e8d8d8; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .prh-title { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: #c02020; font-weight: 700; }
    .prh-count { font-size: 10px; color: #a09080; }
    .planer-right-scroll { flex: 1; overflow-y: auto; }

    /* Zettel-Vorschau Zeilen */
    .zv-section {
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      color: #c02020; font-weight: 700; padding: 7px 7px 2px;
    }
    .zv-row {
      display: flex; align-items: flex-start; min-height: 24px;
      background-image: linear-gradient(to right, #dde0e8 1px, transparent 1px),
                        linear-gradient(to bottom, #dde0e8 1px, transparent 1px);
      background-size: 22px 22px;
    }
    .zv-cb {
      width: 14px; height: 14px; border: 1.5px solid #9a8a78;
      border-radius: 2px; flex-shrink: 0; margin: 4px 4px 0 5px;
    }
    .zv-time { font-size: 9px; font-weight: 700; color: #5a5080; font-family: sans-serif; line-height: 22px; padding-left: 5px; flex-shrink: 0; }
    .zv-text {
      font-size: 12px; color: #18100a; line-height: 22px;
      font-family: 'Georgia', serif; flex: 1; padding-right: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .zv-right { width: 70px; flex-shrink: 0; padding: 3px 4px; z-index: 1; background: white; }
    .zv-pill { font-size: 8px; padding: 1px 3px; border-radius: 3px; display: inline-block; }
    .zvp-zn { color: #cc0000; font-weight: 700; font-size: 10px; }
    .zvp-pl { background: #f0e098; color: #5a4800; font-style: italic; }
    .zv-empty { padding: 3px 7px; font-size: 10px; color: #c8c0b8; font-style: italic; }

    /* Planer Footer */
    .planer-footer {
      background: #eee8de; border-top: 1px solid #d8d0c4;
      padding: 9px 12px; display: flex; gap: 8px; flex-shrink: 0; align-items: center;
    }
    .planer-skip { background: none; border: 1px solid #c8c0b4; border-radius: 8px; padding: 8px 12px; font-size: 11px; color: #8a7a68; cursor: pointer; }
    .planer-weiter { flex: 1; background: #28201a; color: #c8b89a; border: none; border-radius: 8px; padding: 9px; font-size: 12px; font-weight: 700; cursor: pointer; }
    .planer-info { font-size: 10px; color: #a09080; }

    /* Plan-Blöcke in Morgen-Liste */
    .morgen-plan-section {
      font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
      color: #b0a090; font-weight: 600; background: #f5f0e8;
      padding: 4px 12px 2px;
    }
    .morgen-plan-block {
      border-bottom: 1px solid #ede8df;
    }
    .morgen-plan-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px 7px 12px;
      cursor: pointer; user-select: none;
      background: #f5f0e8;
    }
    .morgen-plan-header:hover { background: #ede8df; }
    .morgen-plan-toggle {
      font-size: 11px; color: #9a8a78; flex-shrink: 0; width: 14px; text-align: center;
    }
    .morgen-plan-icon { font-size: 13px; flex-shrink: 0; }
    .morgen-plan-titel {
      flex: 1; font-size: 12.5px; font-weight: 600; color: #28201a;
      font-style: italic;
    }
    .morgen-plan-meta {
      font-size: 10px; color: #9a8a78; flex-shrink: 0;
    }
    /* Schritt-Zeile im aufgeklappten Plan */
    .morgen-plan-schritt {
      display: flex; align-items: flex-start;
      padding: 6px 10px 5px 32px;
      border-bottom: 1px solid #f0ece4;
      gap: 8px; cursor: pointer; user-select: none;
      background: #faf8f4;
    }
    .morgen-plan-schritt:hover { background: #f0ece4; }
    .morgen-plan-schritt.sel  { background: #e8f4ea; }
    .morgen-plan-schritt:last-child { border-bottom: none; }
    .mps-arrow {
      width: 18px; height: 18px;
      border: 1.5px solid #c0b8a8; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: #9a8a78; margin-top: 1px;
      pointer-events: none;
    }
    .morgen-plan-schritt.sel .mps-arrow {
      background: var(--color-done); border-color: var(--color-done); color: white;
    }
    .mps-body { flex: 1; min-width: 0; pointer-events: none; }
    .mps-titel { font-size: 12px; color: #3a3028; line-height: 1.35; pointer-events: none; }
    .mps-sub   { font-size: 10px; color: #9a8a78; margin-top: 2px; pointer-events: none; }

    .morgen-right-empty {
      padding: 20px 14px; font-size: 11px; color: #c0b8a8;
      text-align: center; font-style: italic;
    }

    /* Footer */
    .morgen-footer {
      background: #eee8de;
      border-top: 1px solid var(--color-border);
      padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .morgen-count { font-size: 11px; color: var(--color-muted); flex: 1; }
    .morgen-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px; color: var(--color-muted);
      font-size: 14px; padding: 40px; text-align: center;
    }

    /* ═══════════════════════════════════════
       SCREEN: TAGESZETTEL
    ═══════════════════════════════════════ */
    #screen-zettel {
      background: var(--color-paper);
    }

    .paper-scroll {
      flex: 1;
      overflow-y: auto;
      position: relative;
    }

    /* Rote Marginallinie */
    .paper-scroll::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      right: var(--margin-width);
      width: 1.5px;
      background: var(--color-red-line);
      pointer-events: none;
      z-index: 2;
    }

    .paper-rows {
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .p-section-head {
      padding: 10px 18px 2px calc(var(--handle-width) + 10px);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c02020;
      font-weight: 700;
      background: var(--color-paper);
    }

    .p-row {
      display: flex;
      align-items: stretch;
      min-height: 28px;
      position: relative;
    }
    .p-row.dragging { opacity: 0.4; }
    .p-row.drag-over-top    { border-top: 2px solid var(--color-done); }
    .p-row.drag-over-bottom { border-bottom: 2px solid var(--color-done); }

    /* Drag Handle */
    .p-handle {
      width: var(--handle-width);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d0c8bc;
      font-size: 14px;
      cursor: grab;
      user-select: none;
      padding-left: 4px;
    }
    .p-handle:active { cursor: grabbing; }

    /* Linker Schreibbereich – gepunktet */
    .p-left {
      flex: 1;
      padding: 4px 12px 0 4px;
      display: flex;
      flex-direction: column;
      gap: 0;
      background-image:
        linear-gradient(to right, var(--color-paper-dot) 1px, transparent 1px),
        linear-gradient(to bottom, var(--color-paper-dot) 1px, transparent 1px);
      background-size: 28px 28px;
      background-position: 0 4px;
      min-width: 0;
    }

    .p-line1 {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-height: 28px;
    }

    .p-cb {
      width: 20px;
      height: 20px;
      border: 1.5px solid #9a8a78;
      border-radius: 3px;
      flex-shrink: 0;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      background: transparent;
      cursor: pointer;
      color: transparent;
    }
    .p-cb.done { border-color: #5a5a5a; color: #2a2a2a; background: transparent; }

    .p-notiz-dash {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      margin-top: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #6a5a50;
    }

    .p-text {
      font-size: 17px;
      color: #18100a;
      line-height: 26px;
      font-family: 'Kalam', 'Georgia', cursive;
      flex: 1;
      word-break: break-word;
    }
    .p-text.done  { text-decoration: line-through; color: #9a8a78; }
    .p-text.notiz { color: #5a4a3a; font-style: italic; }

    .p-sub {
      font-size: 16px;
      color: #7a6858;
      font-family: 'Kalam', 'Georgia', cursive;
      padding-left: 30px;
      line-height: 28px;
    }

    /* Rechte Kennzeichenspalte – crème, keine Punkte */
    .p-right {
      width: var(--margin-width);
      flex-shrink: 0;
      background: var(--color-margin);
      padding: 6px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      justify-content: flex-start;
      z-index: 1;
    }

    .p-pill {
      font-size: 16px;
      padding: 4px 9px;
      border-radius: 8px;
      display: inline-block;
      white-space: nowrap;
      width: fit-content;
      font-weight: 600;
    }
    .pp-w  { background: var(--color-work); color: var(--color-work-fg); }
    .pp-p  { background: var(--color-priv); color: var(--color-priv-fg); }
    .pp-pl { background: var(--color-plan); color: var(--color-plan-fg); font-style: italic; }
    .pp-f  { background: var(--color-pill-free); color: var(--color-pill-free-fg); }
    .pp-n  { background: var(--color-note); color: var(--color-note-fg); }
    .pp-ex { background: #f4c8c8; color: #680808; font-weight: 800; }


    .edit-btn {
      background: none;
      border: none;
      color: #c0b8b0;
      font-size: 15px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      align-self: flex-start;
      margin-bottom: 2px;
    }
    .edit-btn:hover { color: #28201a; }
    .edit-btn:active { color: var(--color-done); }

    .p-row.empty .p-text { color: #c0b4a0; font-style: italic; }
    .p-row.empty .p-cb   { border-style: dashed; background: transparent; }

    /* Zettel-Toolbar */
    .zettel-toolbar {
      background: var(--color-header);
      padding: 9px 14px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .tb-btn {
      flex: 1;
      background: rgba(200,184,154,0.12);
      color: var(--color-header-fg);
      border: none;
      border-radius: 9px;
      padding: 9px 4px;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
    }
    .tb-btn.hi {
      background: rgba(200,184,154,0.28);
      border: 1px solid rgba(200,184,154,0.3);
    }
    .tb-btn:active { opacity: 0.7; }

    /* ═══════════════════════════════════════
       SCREEN: TRANSFER (Re-Import)
    ═══════════════════════════════════════ */
    #screen-transfer {
      background: var(--color-bg);
    }

    .transfer-prog {
      background: #eee8de;
      border-bottom: 1px solid var(--color-border);
      padding: 11px 18px 9px;
      flex-shrink: 0;
    }
    .prog-lbl {
      font-size: 11px;
      color: var(--color-muted);
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .prog-track {
      background: var(--color-border);
      border-radius: 4px;
      height: 5px;
      overflow: hidden;
    }
    .prog-fill {
      background: var(--color-done);
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .transfer-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .ri {
      border-radius: 11px;
      padding: 11px 13px;
      border: 1px solid var(--color-border);
      background: white;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .ri.ri-done { border-color: #9ac8a4; background: #f2fbf4; }
    .ri.ri-open { border-color: #d0b898; background: #fdf6ee; }
    .ri.ri-free { border-color: #b8b8cc; background: #f8f8fc; }

    .ri-top {
      display: flex;
      align-items: flex-start;
      gap: 9px;
    }
    .ri-ico { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
    .ri-inf { flex: 1; }
    .ri-tit { font-size: 13px; color: #20180e; font-weight: 600; line-height: 1.3; }
    .ri-sub { font-size: 11px; color: var(--color-muted); margin-top: 2px; }
    .ri-stat {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 8px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .rs-done { background: #c0e8c8; color: #0a4a1a; }
    .rs-open { background: #f0d8b4; color: #5a2800; }

    .ri-steps {
      background: #f0f0f8;
      border-radius: 7px;
      padding: 7px 10px;
      font-size: 12px;
      color: #383660;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ri-step { display: flex; align-items: center; gap: 7px; }
    .ri-sb {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 5px;
      margin-left: auto;
    }
    .rsb-d { background: #c0e8c8; color: #0a4a1a; }
    .rsb-o { background: #f0d8b4; color: #5a2800; }

    .ri-acts {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .ri-btn {
      font-size: 11px;
      padding: 5px 11px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    .rb-ok   { background: var(--color-done); color: white; }
    .rb-sec  { background: #e0d8cc; color: #4a3820; }
    .rb-del  { background: var(--color-danger); color: white; }
    .rb-srch { background: var(--color-priv); color: var(--color-priv-fg); }

    .transfer-footer {
      background: #eee8de;
      border-top: 1px solid var(--color-border);
      padding: 12px 18px;
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════
       MODAL / OVERLAY
    ═══════════════════════════════════════ */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
    }
    #modal-overlay.active { display: flex; }

    .modal-sheet {
      background: white;
      border-radius: 20px 20px 0 0;
      padding: 20px;
      width: 100%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .modal-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--color-header);
      text-align: center;
    }
    .modal-input {
      width: 100%;
      border: 1px solid var(--color-border);
      border-radius: 9px;
      padding: 11px 13px;
      font-size: 14px;
      font-family: 'Kalam', 'Georgia', cursive;
      outline: none;
      resize: none;
    }
    .modal-input:focus { border-color: var(--color-header); }
    .modal-row {
      display: flex;
      gap: 10px;
    }
    .modal-label {
      font-size: 11px;
      color: var(--color-muted);
      margin-bottom: 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-weight: 600;
    }
    .modal-select {
      width: 100%;
      border: 1px solid var(--color-border);
      border-radius: 9px;
      padding: 10px 13px;
      font-size: 13px;
      background: white;
      outline: none;
    }

    /* ═══════════════════════════════════════
       TOAST
    ═══════════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(40,32,26,0.92);
      color: var(--color-header-fg);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* ═══════════════════════════════════════
       HIDDEN FILE INPUT
    ═══════════════════════════════════════ */
    #file-input-work { display: none; }
    #file-input-priv { display: none; }

    /* ═══════════════════════════════════════
       UTILITY
    ═══════════════════════════════════════ */
    .flex-col { display: flex; flex-direction: column; }
    .flex-row { display: flex; flex-direction: row; }
    .gap-8  { gap: 8px; }
    .gap-12 { gap: 12px; }
    .mt-8   { margin-top: 8px; }
    .w-full { width: 100%; }

    /* ═══════════════════════════════════════
       BEARBEITUNGSMODUS
    ═══════════════════════════════════════ */
    #paper-rows.edit-mode .p-handle { color: #9a8a78 !important; cursor: grab; }
    #paper-rows.edit-mode .p-row:hover .p-handle { color: #28201a !important; }
    #paper-rows.edit-mode .p-row { background: rgba(255,248,240,0.6); }
    #paper-rows.edit-mode .p-row:hover { background: rgba(255,240,220,0.8); }

    .p-delete-btn {
      display: none;
      background: none;
      border: none;
      color: #d08080;
      font-size: 20px;
      cursor: pointer;
      padding: 0 6px;
      line-height: 1;
      flex-shrink: 0;
      align-self: center;
    }
    #paper-rows.edit-mode .p-delete-btn { display: flex; align-items: center; }
    .p-delete-btn:active { color: var(--color-danger); }

    .tb-btn.edit-active {
      background: rgba(200,100,80,0.25);
      border: 1px solid rgba(200,100,80,0.5);
      color: #e09080;
    }

    /* ═══════════════════════════════════════
       KENNZEICHEN (Signals)
    ═══════════════════════════════════════ */
    .sig-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      border-radius: 6px;
      border: 1.5px solid transparent;
      font-size: 14px;
      cursor: pointer;
      background: none;
      opacity: 0.35;
      transition: opacity 0.15s, border-color 0.15s;
    }
    .sig-btn.active { opacity: 1; border-color: currentColor; }
    .sig-btn:hover  { opacity: 0.8; }
    .sig-urgent  { color: #cc2020; }
    .sig-unclear { color: #2060cc; }
    .sig-idea    { color: #b08000; }
    .sig-size-s  { color: #608060; font-size: 11px; font-weight: 700; font-family: sans-serif; }
    .sig-size-m  { color: #806040; font-size: 11px; font-weight: 700; font-family: sans-serif; }
    .sig-size-l  { color: #804040; font-size: 11px; font-weight: 700; font-family: sans-serif; }

    /* Pill im Zettel für Kennzeichen */
    .p-sig {
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      padding: 1px 3px;
      border-radius: 4px;
      display: inline-block;
    }
    .ps-urgent  { color: #cc2020; font-size: 18px; font-weight: 900; }
    .ps-unclear { color: #2060cc; font-size: 16px; }
    .ps-idea    { color: #b08000; }
    .ps-size    { color: #606060; font-size: 14px; font-family: sans-serif; font-weight: 700; background: #f0f0f0; border-radius: 4px; padding: 2px 6px; }
    .ps-deadline{ color: #cc2020; font-size: 17px; font-family: sans-serif; font-weight: 700; }

    /* ═══════════════════════════════════════
       ERINNERUNGS-SEKTION (oben)
    ═══════════════════════════════════════ */
    .p-section-heute {
      background: #fff8f0;
      border-bottom: 2px solid #e8c060;
      padding: 8px 14px 8px calc(var(--handle-width) + 10px);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .p-section-heute-title {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #c02020;
      font-weight: 700;
    }
    .erinnerung-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 0;
    }
    .erinnerung-zeit {
      font-size: 15px;
      font-weight: 700;
      color: #28201a;
      font-family: sans-serif;
      min-width: 44px;
    }
    .erinnerung-text.done { text-decoration: line-through; color: #9a8a78; }
    .erinnerung-text {
      font-size: 16px;
      color: #28201a;
      font-family: 'Kalam', 'Georgia', cursive;
      flex: 1;
    }
    .erinnerung-ort {
      font-size: 12px;
      color: var(--color-muted);
      font-family: sans-serif;
    }

    /* ═══════════════════════════════════════
       TERMIN-DETAILS im Zettel
    ═══════════════════════════════════════ */

    .termin-prefix {
      font-family: sans-serif;
      font-size: 15px;
      color: #5a5050;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .termin-suffix {
      font-family: sans-serif;
      font-size: 15px;
      color: #8a7a68;
      font-weight: 400;
    }

    .termin-details {
      font-size: 13px;
      color: var(--color-muted);
      font-family: sans-serif;
      padding-left: 30px;
      line-height: 1.5;
    }
    .termin-details span { margin-right: 10px; }

    /* ═══════════════════════════════════════
       MODAL: Kennzeichen-Auswahl
    ═══════════════════════════════════════ */
    .sig-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .sig-picker-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1.5px solid #e0d8cc;
      background: white;
      cursor: pointer;
      font-size: 13px;
      color: #4a3820;
      transition: border-color 0.15s, background 0.15s;
    }
    .sig-picker-btn.on { border-color: currentColor; background: #faf4ec; }
    .sig-picker-btn.on.urgent  { border-color: #cc2020; background: #fff0f0; }
    .sig-picker-btn.on.unclear { border-color: #2060cc; background: #f0f4ff; }
    .sig-picker-btn.on.idea    { border-color: #b08000; background: #fffce0; }

    .size-picker { display: flex; gap: 6px; }
    .size-btn {
      flex: 1;
      padding: 7px;
      border-radius: 8px;
      border: 1.5px solid #e0d8cc;
      background: white;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      color: #4a3820;
    }
    .size-btn.on { border-color: #28201a; background: #f0ece4; }

    /* ═══════════════════════════════════════
       PLAN & SCHRITTE
    ═══════════════════════════════════════ */
    .p-row.ist-plan { background: #fafafa; }
    /* Plan-Zeile: Titel beginnt genau auf Checkbox-Position (24px handle + 4px padding = 28px) */
    .p-row.ist-plan .p-left { padding-left: 4px !important; }
    /* Dünne goldene Linie links am Handle als Plan-Indikator */
    .p-row.ist-plan .p-handle { border-left: 3px solid #c8b89a; }

    /* Einrückung Schritte – kein Leerzeilen-Gap */
    .p-row.ist-schritt { min-height: 24px; }
    .p-row.ist-schritt .p-left { padding-left: 20px !important; padding-top: 2px; }
    .p-row.ist-schritt .p-handle { color: #e0d8d0; }
    .p-row.ist-schritt .p-cb {
      width: 16px; height: 16px;
      border-radius: 2px;
      margin-top: 4px;
      font-size: 12px;
    }
    .p-row.ist-schritt .p-text { font-size: 17px; color: #3a3028; line-height: 24px; }
    .p-line1.schritt-line { min-height: 24px; }

    /* Plan-Titel: gleiche Schrift wie Aufgabe, unterstrichen, keine CB */
    .p-plan-titel {
      font-size: 19px;
      font-weight: 400;
      color: #18100a;
      line-height: 28px;
      font-family: 'Kalam', 'Georgia', cursive;
      flex: 1;
      word-break: break-word;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: #9a8a78;
    }
    .p-plan-titel.done { text-decoration: line-through; color: #9a8a78; }

    /* Plan-Editor Button: NUR im Edit-Modus sichtbar */
    .plan-edit-btn {
      display: none !important;
      background: none;
      border: 1px solid #c8b89a;
      border-radius: 6px;
      font-size: 11px;
      color: #8a7a68;
      cursor: pointer;
      padding: 2px 8px;
      font-family: sans-serif;
      white-space: nowrap;
      flex-shrink: 0;
      align-self: center;
    }
    .plan-edit-btn:hover { background: #faf4ec; color: #28201a; }
    #paper-rows.edit-mode .plan-edit-btn { display: inline-flex !important; align-items: center; }

    /* Plan-Modal interne Styles */
    .plan-modal-schritt {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0; border-bottom: 1px solid #f0e8e0;
    }
    .plan-modal-schritt:last-child { border-bottom: none; }
    .plan-modal-schritt input {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: 14px; font-family: 'Kalam', 'Georgia', cursive;
      color: #20180e; padding: 2px 4px;
    }
    .plan-modal-schritt input:focus { border-bottom: 1px dashed #c8b89a; }
    .plan-modal-schritt .cb-mini {
      width: 16px; height: 16px; border: 1.5px solid #9a8a78; border-radius: 2px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 11px; cursor: pointer;
    }
    .plan-modal-schritt .cb-mini.done { color: #2a2a2a; border-color: #5a5a5a; }
    .plan-modal-schritt .del-schritt {
      background: none; border: none; color: #d08080; font-size: 16px;
      cursor: pointer; padding: 0 2px; line-height: 1; flex-shrink: 0;
    }
    .plan-schritte-liste {
      border: 1px solid #e8e0d8; border-radius: 8px;
      padding: 4px 8px; max-height: 220px; overflow-y: auto;
    }
    .add-schritt-inline { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
    .add-schritt-inline input {
      flex: 1; border: 1px dashed #c8b89a; border-radius: 6px;
      padding: 6px 10px; font-size: 13px; font-family: 'Kalam', 'Georgia', cursive; outline: none;
    }
    .add-schritt-inline input:focus { border-style: solid; }
    .add-schritt-inline button {
      background: var(--color-done); color: white; border: none;
      border-radius: 6px; padding: 6px 12px; font-size: 13px; cursor: pointer;
    }

function saveDB() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(DB));
  } catch(e) {
    showToast('⚠️ Speichern fehlgeschlagen');
  }
}

function loadDB() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.tageszettel)) {
        DB = parsed;
      }
    }
  } catch(e) {
    console.warn('DB konnte nicht geladen werden:', e);
  }
}

// ═══════════════════════════════════════════════════
// HILFSFUNKTIONEN
// ═══════════════════════════════════════════════════
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function todayISO() {
  return new Date().toISOString().slice(0, 10);
}

function formatDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr + 'T00:00:00');
  return d.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function formatDateShort(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr + 'T00:00:00');
  return d.toLocaleDateString('de-DE', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' });
}

function daysDiff(isoA, isoB) {
  const a = new Date(isoA + 'T00:00:00');
  const b = new Date(isoB + 'T00:00:00');
  return Math.round((b - a) / 86400000);
}

function showToast(msg, dauer) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dauer || 2500);
}

function updateHeaderDate() {
  const el = document.getElementById('header-date');
  if (el) el.textContent = formatDateShort(todayISO());
}

function bereinigeTageszettel() {
  const heute = todayISO();
  DB.tageszettel = DB.tageszettel.filter(z => {
    if (z.status !== 'uebertragen') return true;
    const diff = daysDiff(z.uebertragAm ? z.uebertragAm.slice(0,10) : z.datum, heute);
    return diff < ZETTEL_MAX_DAYS;
  });
  saveDB();
}

function loadSource(typ) {
  // Versuche File System Access API, Fallback auf Input
  if (window.showOpenFilePicker) {
    window.showOpenFilePicker({ types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }] })
      .then(([fh]) => fh.getFile())
      .then(f => f.text())
      .then(text => processSourceJSON(typ, text, ''))
      .catch(e => { if (e.name !== 'AbortError') showToast('Fehler beim Laden'); });
  } else {
    const input = document.getElementById('file-input-' + typ);
    input.onchange = (ev) => {
      const f = ev.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = (e) => processSourceJSON(typ, e.target.result, f.name);
      reader.readAsText(f);
      input.value = '';
    };
    input.click();
  }
}

function processSourceJSON(typ, text, dateiname) {
  try {
    // BOM entfernen
    const clean = text.replace(/^\uFEFF/, '');
    const data = JSON.parse(clean);
    if (!data.aufgaben || !Array.isArray(data.aufgaben)) {
      showToast('⚠️ Ungültiges Backlog-Format');
      return;
    }
    state.quellen[typ] = { dateiname: dateiname || typ + '.json', daten: data };
    document.getElementById('badge-' + typ).style.display = '';
    showToast(typ === 'work' ? '✓ Beruflich geladen' : '✓ Privat geladen');
    // Badge anzeigen
    const badge = document.getElementById('badge-' + typ);
    if (badge) badge.style.display = '';
    renderMorgenList();
  } catch(e) {
    showToast('⚠️ JSON konnte nicht gelesen werden');
    console.error(e);
  }
}

// setFilter: nicht mehr gebraucht (kein Filter-Bereich mehr)
function setFilter(f) { /* deprecated */ }

// ─── Hilfsfunktion: Wiederholung als String ───
function wiederholungText(w) {
  if (!w) return null;
  if (typeof w === 'string') return w;
  if (typeof w === 'object') {
    // WorkAssist-Objekt: { typ, intervall, ... }
    const t = w.typ || w.type || '';
    if (t === 'taeglich'   || t === 'daily')   return 'täglich';
    if (t === 'woechentlich'|| t === 'weekly')  return 'wöchentlich';
    if (t === 'monatlich'  || t === 'monthly')  return 'monatlich';
    if (t === 'jaehrlich'  || t === 'yearly')   return 'jährlich';
    if (t === 'halbjaehrlich')                  return 'halbjährlich';
    const interval = w.intervall || w.interval || '';
    if (interval) return String(interval);
    const keys = Object.keys(w);
    if (keys.length > 0) return String(w[keys[0]] || 'wiederkehrend');
    return 'wiederkehrend';
  }
  return String(w);
}

// ─── Sortierpriorität für Morgen-Liste ───
function morgenSortPrio(a, heute) {
  const istZeitnah  = !!(a.zeitnah || a.istZeitnah);
  const istHeuteFaellig = a.faellig && a.faellig <= heute;
  const hatDatum    = !!a.faellig;
  const hatWiederh  = !!(a.wiederholung);
  if (istZeitnah && istHeuteFaellig) return 0;
  if (istZeitnah)                    return 1;
  if (istHeuteFaellig)               return 2;
  if (hatDatum)                      return 3;
  if (!hatDatum && !hatWiederh)      return 4;
  if (hatWiederh)                    return 5;
  return 6;
}

function getAlleAufgaben() {
  const result = [];
  const heute = todayISO();

  ['work', 'priv'].forEach(typ => {
    if (!state.quellen[typ]) return;
    const data = state.quellen[typ].daten;

    // Plan-Aufgaben-IDs sammeln: diese werden NUR im Plan-Block angezeigt
    const planAufgabeIds = new Set();
    if (data.plaene) {
      data.plaene.forEach(p => {
        // Nur aus aktiven (nicht erledigten) Plänen
        if (p.status === 'erledigt' || p.status === 'abgeschlossen') return;
        (p.schritte || []).forEach(s => {
          if (s.aufgabeId && !s.erledigt && !s.alsErledigt) {
            planAufgabeIds.add(s.aufgabeId);
          }
        });
      });
    }

    (data.aufgaben || []).forEach(a => {
      // Erledigte überspringen
      if (a.erledigt || a.status === 'erledigt') return;
      // Wiedervorlage / Startdatum prüfen
      const startdatum = a.anzeigedatum || a.startdatum || a.wiedervorlage || null;
      if (startdatum && startdatum > heute) return;
      // Aufgaben die in einem Plan referenziert sind → nur im Plan-Block zeigen
      if (planAufgabeIds.has(a.id)) return;

      const wText = wiederholungText(a.wiederholung);

      result.push({
        refId:       a.id,
        quelle:      typ,
        titel:       a.titel,
        prioritaet:  a.prioritaet || 'mittel',
        faellig:     a.faellig || null,
        wiederholung: wText,
        zeitnah:     !!(a.zeitnah || a.istZeitnah),
        groesse:     a.groesse || null,
        planTitel:   null,
        planId:      null,
        bereichId:   a.bereichId || null
      });
    });
  });

  return result;
}

function getAllePlaene() {
  const result = [];

  ['work', 'priv'].forEach(typ => {
    if (!state.quellen[typ]) return;
    const data = state.quellen[typ].daten;
    if (!data.plaene || data.plaene.length === 0) return;

    // Aufgaben-Map für schnellen Zugriff: id → aufgabe
    const aufgabenMap = {};
    (data.aufgaben || []).forEach(a => { aufgabenMap[a.id] = a; });

    data.plaene.forEach(p => {
      // Plan überspringen wenn erledigt/abgeschlossen
      if (p.status === 'erledigt' || p.status === 'abgeschlossen') return;

      const alleSchritte = p.schritte || [];

      // Offene Schritte: robuste erledigt-Prüfung
      const offeneSchritte = alleSchritte.filter(s => {
        // Schritt selbst erledigt?
        if (s.erledigt === true || s.status === 'erledigt' || s.alsErledigt === true) return false;
        // Schritt hat aufgabeId → Aufgabe erledigt?
        if (s.aufgabeId) {
          const aufgabe = aufgabenMap[s.aufgabeId];
          if (aufgabe && (aufgabe.erledigt === true || aufgabe.status === 'erledigt')) return false;
        }
        return true;
      });

      if (offeneSchritte.length === 0) return;

      result.push({
        planId:    p.id,
        quelle:    typ,
        titel:     p.titel,
        prioritaet: p.prioritaet || 'mittel',
        // ALLE offenen Schritte zeigen – inklusive die mit aufgabeId
        schritte: offeneSchritte.map((s, offenerIdx) => {
          const aufgabe = s.aufgabeId ? aufgabenMap[s.aufgabeId] : null;
          // WorkAssist hat KEIN id-Feld auf Schritten!
          // Schritte werden über Array-Index im Original-Array identifiziert
          const originalIdx = alleSchritte.indexOf(s);
          return {
            schrittIdx:   originalIdx,  // Index im p.schritte Array
            titel:        s.titel,
            delegiertAn:  s.delegiertAn || null,
            aufgabeId:    s.aufgabeId || null,
            aufgabeTitel: aufgabe ? aufgabe.titel : null,
            faellig:      aufgabe ? aufgabe.faellig || null : null,
            zeitnah:      aufgabe ? !!(aufgabe.zeitnah || aufgabe.istZeitnah) : false,
            groesse:      aufgabe ? aufgabe.groesse || null : null
          };
        })
      });
    });
  });

  return result;
}

function toggleMorgenPlan(planId) {
  state.morgenPlanAufgeklappt[planId] = !state.morgenPlanAufgeklappt[planId];
  renderMorgenList();
}

function onPlanSchrittClick(event, planId, schrittIdx, quelle) {
  event.stopPropagation();
  togglePlanSchritt(planId, schrittIdx, quelle);
}

function togglePlanSchritt(planId, schrittIdx, quelle) {
  const key = planId + '|' + schrittIdx;
  const existing = state.morgenAusgewaehlt.findIndex(x => x.planSchrittKey === key);
  if (existing >= 0) {
    state.morgenAusgewaehlt.splice(existing, 1);
    renderMorgenList();
    return;
  }

  const data = state.quellen[quelle]?.daten;
  const plan = data?.plaene?.find(p => p.id === planId);
  if (!plan) return;

  // WorkAssist: Schritt via Array-Index
  const schritt = (plan.schritte || [])[schrittIdx];
  if (!schritt) return;

  const aufgabenMap = {};
  (data.aufgaben || []).forEach(a => { aufgabenMap[a.id] = a; });
  const aufgabe = schritt.aufgabeId ? aufgabenMap[schritt.aufgabeId] : null;
  const anzeigeTitel = aufgabe ? aufgabe.titel : schritt.titel;

  state.morgenAusgewaehlt.push({
    refId:          aufgabe ? aufgabe.id : null,
    quelle:         quelle,
    titel:          anzeigeTitel,
    planTitel:      plan.titel,
    planId:         planId,
    planSchrittKey: key,
    schrittIdx:     schrittIdx,
    faellig:        aufgabe ? aufgabe.faellig || null : null,
    zeitnah:        aufgabe ? !!(aufgabe.zeitnah || aufgabe.istZeitnah) : false,
    groesse:        aufgabe ? aufgabe.groesse || null : null,
    wiederholung:   null,
    istPlanSchritt: true
  });
  renderMorgenList();
}

function renderMorgenList() {
  const heute = todayISO();
  const alle  = getAlleAufgaben();

  // Gesamt-Count
  const availEl = document.getElementById('morgen-avail-count');
  if (availEl) availEl.textContent = alle.length + ' offen';

  const leftScroll = document.getElementById('morgen-left-scroll');
  if (!leftScroll) return;

  if (alle.length === 0 && !state.quellen.work && !state.quellen.priv) {
    leftScroll.innerHTML = `<div class="morgen-empty"><div style="font-size:28px;">📁</div><div>Backlog laden</div></div>`;
    renderMorgenRight();
    return;
  }

  // Nach Quelle trennen + sortieren
  const work = alle.filter(a => a.quelle === 'work').sort((a,b) => {
    const pa = morgenSortPrio(a, heute), pb = morgenSortPrio(b, heute);
    if (pa !== pb) return pa - pb;
    if (a.faellig && b.faellig) return a.faellig.localeCompare(b.faellig);
    return a.titel.localeCompare(b.titel);
  });
  const priv = alle.filter(a => a.quelle === 'priv').sort((a,b) => {
    const pa = morgenSortPrio(a, heute), pb = morgenSortPrio(b, heute);
    if (pa !== pb) return pa - pb;
    if (a.faellig && b.faellig) return a.faellig.localeCompare(b.faellig);
    return a.titel.localeCompare(b.titel);
  });

  let html = '';

  function renderGruppe(aufgaben, quellLabel, dotColor) {
    if (aufgaben.length === 0) return;
    html += `<div class="morgen-quelle-div">
      <div class="morgen-quelle-dot" style="background:${dotColor};"></div>
      <span class="morgen-quelle-label">${quellLabel}</span>
      <span class="morgen-quelle-count">${aufgaben.length} Aufgaben</span>
    </div>`;

    // Gruppen definieren
    const gruppen = [
      { label: '⚡ Zeitnah · Heute fällig', items: aufgaben.filter(a => morgenSortPrio(a,heute) <= 1) },
      { label: 'Heute fällig',              items: aufgaben.filter(a => morgenSortPrio(a,heute) === 2) },
      { label: 'Demnächst fällig',          items: aufgaben.filter(a => morgenSortPrio(a,heute) === 3) },
      { label: 'Ohne Datum',                items: aufgaben.filter(a => morgenSortPrio(a,heute) === 4) },
      { label: 'Wiederkehrend',             items: aufgaben.filter(a => morgenSortPrio(a,heute) === 5) },
    ];

    gruppen.forEach(g => {
      if (g.items.length === 0) return;
      html += `<div class="morgen-prio-head">${g.label}</div>`;
      g.items.forEach(a => {
        const isSel = state.morgenAusgewaehlt.some(x => x.refId === a.refId && x.quelle === a.quelle);
        let meta = '';
        if (a.zeitnah)             meta += `<span class="pm pm-zeitnah">⚡ zeitnah</span>`;
        if (a.faellig <= heute && a.faellig)
                                   meta += `<span class="pm pm-dl-heute">⚑ heute</span>`;
        else if (a.faellig)        meta += `<span class="pm pm-dl">⚑ ${a.faellig.slice(8)}.${a.faellig.slice(5,7)}.</span>`;
        if (a.groesse)             meta += `<span class="pm pm-sz">${escHtml(a.groesse)}</span>`;
        if (a.planTitel)           meta += `<span class="pm pm-plan-new">${escHtml(a.planTitel)}</span>`;
        if (a.wiederholung)        meta += `<span class="pm pm-rec">${escHtml(a.wiederholung)}</span>`;

        html += `<div class="pick-row${isSel ? ' sel' : ''}"
          onclick="toggleAuswahlNeu('${a.refId}','${a.quelle}')">
          <div class="pick-arrow">${isSel ? '✓' : '→'}</div>
          <div class="pick-body">
            <div class="pick-title-new${a.zeitnah ? ' zeitnah' : ''}">${escHtml(a.titel)}</div>
            ${meta ? `<div class="pick-meta-new">${meta}</div>` : ''}
          </div>
        </div>`;
      });
    });
  }

  const allePlaene = getAllePlaene();
  const plaeneWork = allePlaene.filter(p => p.quelle === 'work');
  const plaenePriv = allePlaene.filter(p => p.quelle === 'priv');

  function renderPlanBloecke(plaene, quelle) {
    if (plaene.length === 0) return;
    html += `<div class="morgen-plan-section">Pläne</div>`;
    plaene.forEach(p => {
      const aufgeklappt = !!state.morgenPlanAufgeklappt[p.planId];
      const selAnzahl = p.schritte.filter(s =>
        state.morgenAusgewaehlt.some(x => x.planSchrittKey === p.planId + '|' + s.schrittIdx)
      ).length;

      html += `<div class="morgen-plan-block">
        <div class="morgen-plan-header" onclick="toggleMorgenPlan('${p.planId}')">
          <span class="morgen-plan-toggle">${aufgeklappt ? '▼' : '▶'}</span>
          <span class="morgen-plan-icon">📋</span>
          <span class="morgen-plan-titel">${escHtml(p.titel)}</span>
          <span class="morgen-plan-meta">${selAnzahl > 0 ? selAnzahl + ' gew. · ' : ''}${p.schritte.length} offen</span>
        </div>`;

      if (aufgeklappt) {
        p.schritte.forEach((s, sIdx) => {
          const key = p.planId + '|' + s.schrittIdx;
          const isSel = state.morgenAusgewaehlt.some(x => x.planSchrittKey === key);
          // Zeige Aufgaben-Titel wenn Schritt eine verknüpfte Aufgabe hat
          const anzeigeTitel = s.aufgabeTitel || s.titel;
          // Meta-Pills wie normale Aufgaben
          let metaPills = '';
          if (s.zeitnah)     metaPills += `<span class="pm pm-zeitnah">⚡ zeitnah</span>`;
          if (s.faellig) {
            const heute2 = todayISO();
            if (s.faellig <= heute2)
                               metaPills += `<span class="pm pm-dl-heute">⚑ heute</span>`;
            else               metaPills += `<span class="pm pm-dl">⚑ ${s.faellig.slice(8)}.${s.faellig.slice(5,7)}.</span>`;
          }
          if (s.groesse)     metaPills += `<span class="pm pm-sz">${escHtml(s.groesse)}</span>`;
          if (s.delegiertAn) metaPills += `<span class="pm pm-rec">→ ${escHtml(s.delegiertAn)}</span>`;

          // Schritt-Index innerhalb dieses Plans als einfache Zahl speichern
          const _idx = window._dpPSIdx++;
          window._dpPSM[_idx] = { planId: p.planId, schrittIdx: s.schrittIdx, quelle: quelle };
          html += `<div class="morgen-plan-schritt${isSel ? ' sel' : ''}"
            onclick="window.dpKlickSchritt(${_idx})" style="cursor:pointer;">
            <div class="mps-arrow" style="pointer-events:none;">${isSel ? '✓' : '→'}</div>
            <div class="mps-body" style="pointer-events:none;">
              <div class="mps-titel">${escHtml(anzeigeTitel)}</div>
              ${metaPills ? `<div class="pick-meta-new" style="margin-top:3px;">${metaPills}</div>` : ''}
            </div>
          </div>`;
        });
      }
      html += `</div>`;
    });
  }

  if (work.length > 0 || plaeneWork.length > 0) {
    renderGruppe(work, 'Beruflich', '#28201a');
    renderPlanBloecke(plaeneWork, 'work');
  }
  if (priv.length > 0 || plaenePriv.length > 0) {
    renderGruppe(priv, 'Privat', '#20183a');
    renderPlanBloecke(plaenePriv, 'priv');
  }

  if (html === '') {
    html = `<div class="morgen-empty"><div style="font-size:28px;">✓</div><div>Alle Aufgaben erledigt</div></div>`;
  }

  leftScroll.innerHTML = html;

  renderMorgenRight();
  updateMorgenCount();
}

function toggleAuswahlNeu(refId, quelle) {
  const alle = getAlleAufgaben();
  const a = alle.find(x => x.refId === refId && x.quelle === quelle);
  if (!a) return;
  const existing = state.morgenAusgewaehlt.findIndex(x => x.refId === refId && x.quelle === quelle);
  if (existing >= 0) {
    state.morgenAusgewaehlt.splice(existing, 1);
  } else {
    state.morgenAusgewaehlt.push(a);
  }
  renderMorgenList();
}

function renderMorgenRight() {
  const scroll = document.getElementById('morgen-right-scroll');
  const emptyEl = document.getElementById('morgen-right-empty');
  if (!scroll) return;

  const sel = state.morgenAusgewaehlt;
  const selWork = sel.filter(a => a.quelle === 'work');
  const selPriv = sel.filter(a => a.quelle === 'priv');

  if (sel.length === 0) {
    scroll.innerHTML = `<div class="morgen-right-empty">Noch nichts ausgewählt</div>`;
    return;
  }

  let html = '';

  function renderSelGruppe(aufgaben, label, srcClass, srcKurz) {
    if (aufgaben.length === 0) return;
    html += `<div class="morgen-right-section">${label}</div>`;
    aufgaben.forEach(a => {
      let sub = '';
      if (a.zeitnah)   sub += '⚡ zeitnah · ';
      if (a.faellig)   sub += `⚑ ${a.faellig.slice(8)}.${a.faellig.slice(5,7)}. · `;
      if (a.groesse)   sub += `${a.groesse} · `;
      if (a.planTitel) sub += `${escHtml(a.planTitel)} · `;
      if (a.istPlanSchritt) sub += 'Planschritt · ';
      sub = sub.replace(/ · $/, '');

      const removeOnClick = a.istPlanSchritt
        ? `togglePlanSchritt('${a.planId}',${a.schrittIdx},'${a.quelle}')`
        : `toggleAuswahlNeu('${a.refId}','${a.quelle}')`;

      html += `<div class="sel-row">
        <div class="sel-remove" onclick="${removeOnClick}">×</div>
        <div class="sel-body">
          <div class="sel-title">${escHtml(a.titel)}</div>
          <div class="sel-sub">${sub}<span class="sel-src ${srcClass}">${srcKurz}</span></div>
        </div>
      </div>`;
    });
  }

  renderSelGruppe(selWork, 'Beruflich', 'src-w', 'B');
  renderSelGruppe(selPriv, 'Privat',    'src-p', 'P');

  html += `<div class="morgen-add-hint" onclick="addEntry('termin')">＋ Termin / freien Eintrag hinzufügen</div>`;

  scroll.innerHTML = html;
}

function updateMorgenCount() {
  const el = document.getElementById('morgen-count');
  if (!el) return;
  const n = state.morgenAusgewaehlt.length;
  el.textContent = n === 0 ? 'Tippe zum Auswählen' : `${n} Aufgabe${n === 1 ? '' : 'n'} ausgewählt`;
  const selCount = document.getElementById('morgen-sel-count');
  if (selCount) selCount.textContent = n + ' ausgewählt';
}

function toggleAuswahl(idx) { /* deprecated – nicht mehr verwendet */ }

// ═══════════════════════════════════════════════════
// TAGESZETTEL GENERIEREN
// ═══════════════════════════════════════════════════
function generateZettel() {
  const heute = todayISO();
  let eintraege = [];
  let reihenfolge = 0;

  state.morgenAusgewaehlt.forEach(a => {
    // Plan-Schritt ohne Aufgaben-Referenz
    if (a.istPlanSchritt) {
      eintraege.push({
        id: genId(),
        typ: 'aufgabe',
        text: a.titel,
        erledigt: false,
        zusatz: '',
        quelle: a.quelle,
        refId: null,
        planId: null,
        planTitel: a.planTitel,
        miniplanId: null,
        istPlan: false,
        istSchritt: false,
        abschnitt: 'aufgaben',
        reihenfolge: reihenfolge++,
        transferiert: false,
        transferAktion: null,
        kennzeichen: { urgent: false, unclear: false, idea: false },
        groesse: null,
        deadline: null,
        terminDaten: null
      });
      return; // nächster Eintrag
    }
    eintraege.push({
      id: genId(),
      typ: 'aufgabe',
      text: a.titel,
      erledigt: false,
      zusatz: '',
      quelle: a.quelle,
      refId: a.refId,
      planId: a.planId,
      planTitel: a.planTitel,
      miniplanId: null,
      abschnitt: 'aufgaben',
      reihenfolge: reihenfolge++,
      transferiert: false,
      transferAktion: null
    });
  });

  const zettel = {
    id: genId(),
    datum: heute,
    status: 'aktiv',
    eintraege: eintraege,
    quellen: {
      work: state.quellen.work ? { dateiname: state.quellen.work.dateiname, daten: state.quellen.work.daten } : null,
      priv: state.quellen.priv ? { dateiname: state.quellen.priv.dateiname, daten: state.quellen.priv.daten } : null
    },
    erstelltAm: new Date().toISOString(),
    uebertragAm: null
  };

  DB.tageszettel.push(zettel);
  saveDB();

  state.activeZettelId = zettel.id;
  showToast('✓ Tageszettel generiert');
  renderZettel();
  showScreen('zettel');
  setBadge('aktiv', 'badge-active');
}

// ═══════════════════════════════════════════════════
// TAGESZETTEL RENDERN
// ═══════════════════════════════════════════════════
function getAktuellerZettel() {
  return DB.tageszettel.find(z => z.id === state.activeZettelId) || null;
}

function openZettel(id) {
  state.activeZettelId = id;
  renderZettel();
  showScreen('zettel');
  setBadge('aktiv', 'badge-active');
}

function renderZettel() {
  const zettel = getAktuellerZettel();
  if (!zettel) { renderStartScreen(); return; }

  const abschnitte = ['aufgaben', 'termine', 'tagesueber', 'notizen'];
  const abschnittLabels = {
    aufgaben: 'Aufgaben',
    termine: 'Termine',
    tagesueber: 'Tagsüber',
    notizen: 'Notizen'
  };

  let html = '';

  // Erinnerungs-Sektion: Termine mit erinnerungAktiv=true ganz oben
  const erinnerungen = zettel.eintraege.filter(e =>
    e.terminDaten && e.terminDaten.erinnerungAktiv && !e.erledigt
  ).sort((a, b) => (a.terminDaten.erinnerung || '').localeCompare(b.terminDaten.erinnerung || ''));

  if (erinnerungen.length > 0) {
    html += `<div class="p-section-heute">
      <div class="p-section-heute-title">Heute</div>`;
    erinnerungen.forEach(e => {
      const td = e.terminDaten;
      html += `<div class="erinnerung-item">
        <div class="p-cb${e.erledigt ? ' done' : ''}" onclick="toggleEintrag('${e.id}');renderZettel();" style="flex-shrink:0;margin-top:0;">${e.erledigt ? '✓' : ''}</div>
        <span class="erinnerung-zeit">${escHtml(td.erinnerung || td.start || '')}</span>
        <span class="erinnerung-text${e.erledigt ? ' done' : ''}">${escHtml(e.text)}${td.ort ? ' <span style=\"color:#8a7a68;font-size:13px;font-family:sans-serif;\">('+escHtml(td.ort)+')</span>' : ''}</span>
      </div>`;
    });
    html += `</div>`;
  }

  abschnitte.forEach(abschnitt => {
    const alleImAbschnitt = zettel.eintraege
      .filter(e => e.abschnitt === abschnitt)
      .sort((a, b) => a.reihenfolge - b.reihenfolge);

    if (abschnitt === 'tagesueber' && alleImAbschnitt.length === 0) return;
    if (abschnitt === 'notizen' && alleImAbschnitt.length === 0) return;

    html += `<div class="p-section-head">${abschnittLabels[abschnitt]}</div>`;

    // Plan-bewusste Ausgabe: Schritte direkt nach Plan-Zeile
    // Gruppen: [plan, schritt, schritt, ..., normale aufgabe, ...]
    const ausgegeben = new Set();
    alleImAbschnitt.forEach((e, i) => {
      if (ausgegeben.has(e.id)) return;
      ausgegeben.add(e.id);
      html += renderZettelRow(e, abschnitt, i);

      // Wenn es ein Plan ist: Schritte direkt danach ausgeben
      if (e.istPlan && e.planId) {
        const schritte = alleImAbschnitt.filter(s => s.istSchritt && s.planId === e.planId);
        schritte.forEach((s, si) => {
          ausgegeben.add(s.id);
          html += renderZettelRow(s, abschnitt, si);
        });
        // Schritt-hinzufügen: über Plan-Editor
      }
    });
  });

  // Leere Eingabezeile
  html += `<div class="p-row empty">
    <div class="p-handle" style="opacity:0.2">⠿</div>
    <div class="p-left">
      <div class="p-line1">
        <div class="p-cb"></div>
        <div class="p-text" onclick="addEntry('aufgabe')" style="cursor:pointer;">Neuer Eintrag …</div>
      </div>
    </div>
    <div class="p-right"></div>
  </div>`;

  document.getElementById('paper-rows').innerHTML = html;
  updateZettelToolbar();

  // Langer Druck für Touch-Geräte auf jede Zeile
  document.querySelectorAll('.p-left[id^="left-"]').forEach(el => {
    const id = el.id.replace('left-', '');
    setupLongPress(el, id);
  });
}

function renderZettelRow(e, abschnitt, i) {
  const istNotiz  = e.typ === 'notiz';
  const istPlan   = e.istPlan === true;
  const istSchritt= e.istSchritt === true;

  // Checkbox: Notiz=Quadrat, Plan=kein Element (padding übernimmt Positionierung), Aufgabe=Kästchen
  let cbHtml = '';
  if (istNotiz) {
    cbHtml = `<div class="p-notiz-dash">■</div>`;
  } else if (istPlan) {
    cbHtml = ''; // kein Platzhalter – p-left padding übernimmt Ausrichtung
  } else {
    cbHtml = `<div class="p-cb${e.erledigt ? ' done' : ''}" onclick="toggleEintrag('${e.id}')">${e.erledigt ? '✓' : ''}</div>`;
  }

  // Text-Klasse
  let textClass = istPlan ? 'p-plan-titel' : 'p-text';
  if (e.erledigt) textClass += ' done';
  if (istNotiz)   textClass += ' notiz';

  // Rechte Spalte: Kennzeichen + Plan-Pill (nur Einzelaufgabe mit Plan)
  let pillsHtml = '';
  if (!istPlan && !istSchritt && e.planTitel) {
    pillsHtml += `<span class="p-pill pp-pl">${escHtml(e.planTitel)}</span>`;
  }
  const kz = e.kennzeichen || {};
  if (kz.urgent)  pillsHtml += `<span class="p-sig ps-urgent">!</span>`;
  if (kz.unclear) pillsHtml += `<span class="p-sig ps-unclear">?</span>`;
  if (kz.idea)    pillsHtml += `<span class="p-sig ps-idea">💡</span>`;
  // Größe wird im Aufgabentext angezeigt, nicht in der Marginalspalte
  if (e.deadline) pillsHtml += `<span class="p-sig ps-deadline">⚑${formatDeadlineShort(e.deadline)}</span>`;

  // Freitext-Zusatz (nicht bei Plan-Hauptzeile)
  // Schritte: kein leerer Platzhalter (würde Leerzeile erzeugen)
  let zusatzHtml = '';
  if (!istPlan) {
    const subIndent = istSchritt ? '36px' : '30px';
    if (e.zusatz) {
      zusatzHtml = `<div class="p-sub" onclick="editZusatz('${e.id}')" style="cursor:text;padding-left:${subIndent};">${escHtml(e.zusatz)}</div>`;
    } else if (!istSchritt) {
      zusatzHtml = `<div class="p-sub-placeholder" onclick="editZusatz('${e.id}')" style="cursor:text;min-height:20px;color:#c8c0b8;font-size:16px;padding-left:${subIndent};font-family:'Kalam','Georgia',cursive;"></div>`;
    }
  }

  // Termin-Prefix / Suffix
  let terminTextPrefix = '';
  let terminTextSuffix = '';
  if (e.terminDaten) {
    const td = e.terminDaten;
    if (td.start) terminTextPrefix = td.start + (td.ende ? ' – ' + td.ende : '') + ': ';
    if (td.ort)   terminTextSuffix = ' (' + escHtml(td.ort) + ')';
  }

  // Delete-Button (nur Edit-Modus, via CSS)
  const deleteBtn = `<button class="p-delete-btn" onclick="deleteEintrag('${e.id}')">×</button>`;

  // Plan-Edit-Button: auf Plan-Zeile → öffnet Plan-Editor
  //                   auf Einzelaufgabe → öffnet Hochstufen-Dialog
  //                   auf Schritt → kein Button (Schritt über Plan editieren)
  let planEditBtn = '';
  if (istPlan) {
    planEditBtn = `<button class="plan-edit-btn" onclick="openPlanEditor('${e.planId}')">✎ Plan</button>`;
  } else if (!istSchritt && e.typ === 'aufgabe') {
    planEditBtn = `<button class="plan-edit-btn" onclick="openPlanEditor(null,'${e.id}')">→ Plan</button>`;
  }

  // Row-Klassen
  let rowClass = 'p-row';
  if (istPlan)    rowClass += ' ist-plan';
  if (istSchritt) rowClass += ' ist-schritt';

  // Schritte sind nicht einzeln verschiebbar (nur via Plan-Editor)
  const draggableAttr = istSchritt ? 'draggable="false"' : 'draggable="true"';
  const dragHandlers = istSchritt ? '' : `
    ondragstart="onDragStart(event,'${e.id}','${abschnitt}')"
    ondragover="onDragOver(event)"
    ondrop="onDrop(event,'${e.id}','${abschnitt}')"
    ondragend="onDragEnd(event)"
    ondragleave="onDragLeave(event)"`;

  return `<div class="${rowClass}" data-id="${e.id}" data-abschnitt="${abschnitt}"
    ${draggableAttr}${dragHandlers}>
    ${deleteBtn}
    <div class="p-handle" style="${istSchritt ? 'cursor:default;opacity:0.2;' : ''}">⠿</div>
    <div class="p-left" oncontextmenu="return onContextMenu(event,'${e.id}')" id="left-${e.id}"
         onclick="if(state.editMode && !event.target.closest('button')){ openEditModal('${e.id}'); }">
      <div class="p-line1">
        ${cbHtml}
        <div class="${textClass}"><span class="termin-prefix">${terminTextPrefix}</span>${escHtml(e.text)}${e.groesse && !istPlan && !istSchritt && e.typ !== 'termin' ? ` <span style="color:#9a8a78;font-size:14px;font-family:sans-serif;">(${escHtml(e.groesse)} min)</span>` : ''}<span class="termin-suffix">${terminTextSuffix}</span></div>
        ${planEditBtn}
      </div>
      ${zusatzHtml}
    </div>
    <div class="p-right">${pillsHtml}</div>
  </div>`;
}

function updateZettelToolbar() {
  const zettel = getAktuellerZettel();
  if (!zettel) return;
  const aufgaben = zettel.eintraege.filter(e => e.typ !== 'notiz');
  const done = aufgaben.filter(e => e.erledigt).length;
  const total = aufgaben.length;
  const el = document.getElementById('tb-progress');
  if (el) el.textContent = `☑ ${done}/${total}`;
}

function toggleEintrag(id) {
  const zettel = getAktuellerZettel();
  if (!zettel) return;
  const e = zettel.eintraege.find(x => x.id === id);
  if (!e) return;
  e.erledigt = !e.erledigt;
  // Plan: alle Schritte mittogglen
  if (e.istPlan && e.planId) {
    zettel.eintraege.filter(s => s.istSchritt && s.planId === e.planId)
      .forEach(s => { s.erledigt = e.erledigt; });
  }
  saveDB();
  renderZettel();
}

function showProgress() {
  const zettel = getAktuellerZettel();
  if (!zettel) return;
  const aufgaben = zettel.eintraege.filter(e => e.typ !== 'notiz');
  const done = aufgaben.filter(e => e.erledigt).length;
  showToast(`${done} von ${aufgaben.length} erledigt`);
}

    <div class="modal-row">
