<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0A6B5E">
  <title>WorkBench 1.0.0</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F0F2F4;
      --surface:   #FFFFFF;
      --surface2:  #E4E8EC;
      --border:    #C8D0D8;
      --text:      #1A1F24;
      --muted:     #5A6472;
      --faint:     #8A96A2;
      --accent:    #0A6B5E;
      --accent2:   #4D5F33;
      --danger:    #C0392B;
      --warn:      #B45309;
      --radius:    10px;
      --radius-sm: 6px;
      --font:      -apple-system, 'Helvetica Neue', Arial, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', monospace;
    }

    [data-theme="dark"] {
      --bg:        #141A1F;
      --surface:   #1E262E;
      --surface2:  #252F38;
      --border:    #2E3A44;
      --text:      #E8EDF2;
      --muted:     #8A9BAA;
      --faint:     #546270;
      --accent:    #0E9B8A;
      --accent2:   #7A9B52;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.4;
      overscroll-behavior: none;
    }

    #wb-app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    #wb-header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      padding: 10px 16px;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #wb-header-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    #wb-menu-version {
      font-size: 0.7rem;
      color: var(--faint);
      font-family: var(--font-mono);
    }

    #wb-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .wb-section {
      min-height: 100%;
      padding: 16px;
    }

    #wb-tabbar {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1.5px solid var(--border);
      padding: 5px 8px env(safe-area-inset-bottom, 0);
      display: flex;
    }

    .wb-tab {
      font-size: 10px;
      color: var(--faint);
      text-align: center;
      flex: 1;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 4px 2px;
      cursor: pointer;
      user-select: none;
      border-top: 2px solid transparent;
      transition: color 0.15s;
    }

    .wb-tab.active {
      color: var(--accent);
      font-weight: 700;
      border-top-color: var(--accent);
    }

    .wb-stub {
      color: var(--faint);
      font-size: 14px;
      padding: 32px 16px;
      text-align: center;
    }

    /* Startup-Screen */
    #wb-startup {
      position: fixed;
      inset: 0;
      background: var(--accent);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s;
    }

    #wb-startup-logo {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
    }

    #wb-startup-tagline {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      margin-top: 6px;
    }
  </style>
</head>
<body>

<div id="wb-startup">
  <div id="wb-startup-logo">WorkBench</div>
  <div id="wb-startup-tagline">v1.0.0</div>
</div>

<div id="wb-app">

  <div id="wb-header">
    <div id="wb-header-title">WorkBench</div>
    <div id="wb-menu-version">v1.0.0 · Build 20260616-0700</div>
  </div>

  <div id="wb-content">
    <div id="sec-cockpit"  class="wb-section"><div class="wb-stub">Cockpit — kommt in Prompt 2</div></div>
    <div id="sec-backlog"  class="wb-section" style="display:none"><div class="wb-stub">Backlog — kommt in Prompt 3</div></div>
    <div id="sec-vorhaben" class="wb-section" style="display:none"><div class="wb-stub">Vorhaben — kommt in Prompt 4</div></div>
    <div id="sec-ablage"   class="wb-section" style="display:none"><div class="wb-stub">Ablage — kommt in Prompt 5</div></div>
    <div id="sec-woche"    class="wb-section" style="display:none"><div class="wb-stub">Woche — kommt in Prompt 6</div></div>
    <div id="sec-ziele"    class="wb-section" style="display:none"><div class="wb-stub">Ziele — kommt in Prompt 7</div></div>
  </div>

  <div id="wb-tabbar">
    <div class="wb-tab active" data-tab="cockpit"  onclick="WB.tabSwitch('cockpit')">Cockpit</div>
    <div class="wb-tab"        data-tab="backlog"  onclick="WB.tabSwitch('backlog')">Backlog</div>
    <div class="wb-tab"        data-tab="vorhaben" onclick="WB.tabSwitch('vorhaben')">Vorhaben</div>
    <div class="wb-tab"        data-tab="ablage"   onclick="WB.tabSwitch('ablage')">Ablage</div>
    <div class="wb-tab"        data-tab="woche"    onclick="WB.tabSwitch('woche')">Woche</div>
    <div class="wb-tab"        data-tab="ziele"    onclick="WB.tabSwitch('ziele')">Ziele</div>
  </div>

</div>

<script>
const WB = {

  APP_VERSION: '1.0.0',
  APP_BUILD:   '20260616-0700',

  activeTab: 'cockpit',

  tabSwitch(tab) {
    this.activeTab = tab;
    document.querySelectorAll('.wb-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    document.querySelectorAll('.wb-section').forEach(s => {
      s.style.display = 'none';
    });
    const sec = document.getElementById('sec-' + tab);
    if (sec) sec.style.display = 'block';
    this.renderSection(tab);
  },

  renderSection(tab) {
    switch(tab) {
      case 'cockpit':  this.renderCockpit();  break;
      case 'backlog':  this.renderBacklog();  break;
      case 'vorhaben': this.renderVorhaben(); break;
      case 'ablage':   this.renderAblage();   break;
      case 'woche':    this.renderWoche();    break;
      case 'ziele':    this.renderZiele();    break;
    }
  },

  renderCockpit()  { /* Prompt 2 */ },
  renderBacklog()  { /* Prompt 3 */ },
  renderVorhaben() { /* Prompt 4 */ },
  renderAblage()   { /* Prompt 5 */ },
  renderWoche()    { /* Prompt 6 */ },
  renderZiele()    { /* Prompt 7 */ },

  _esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  },

  _toast(msg, dur) {
    dur = dur || 2500;
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1F24;color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.2s;white-space:nowrap;';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(() => { t.style.opacity = '1'; });
    setTimeout(() => {
      t.style.opacity = '0';
      setTimeout(() => t.remove(), 200);
    }, dur);
  },

  _dStr(d) {
    // IMMER lokale Zeit — niemals toISOString() für Datumstrings!
    return d.getFullYear() + '-'
      + String(d.getMonth() + 1).padStart(2, '0') + '-'
      + String(d.getDate()).padStart(2, '0');
  },

  setDirty() {
    // Wird in Prompt 2 (Datenhaltung) implementiert
  },

  init() {
    setTimeout(() => {
      const s = document.getElementById('wb-startup');
      if (s) {
        s.style.opacity = '0';
        setTimeout(() => s.remove(), 300);
      }
    }, 800);
    this.tabSwitch('cockpit');
  },

};

document.addEventListener('DOMContentLoaded', () => WB.init());
</script>
</body>
</html>
