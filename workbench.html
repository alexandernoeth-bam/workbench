<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0A6B5E">
  <title>WorkBench 1.2.0</title>
  <link rel="manifest" href="manifest.json">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F0F2F4;
      --surface:   #FFFFFF;
      --surface2:  #E4E8EC;
      --border:    #C8D0D8;
      --text:      #1A1F24;
      --muted:     #5A6472;
      --faint:     #8A96A2;
      --accent:    #0A6B5E;
      --accent2:   #4D5F33;
      --danger:    #C0392B;
      --warn:      #B45309;
      --radius:    10px;
      --radius-sm: 6px;
      --font:      -apple-system, 'Helvetica Neue', Arial, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', monospace;
    }

    [data-theme="dark"] {
      --bg:        #141A1F;
      --surface:   #1E262E;
      --surface2:  #252F38;
      --border:    #2E3A44;
      --text:      #E8EDF2;
      --muted:     #8A9BAA;
      --faint:     #546270;
      --accent:    #0E9B8A;
      --accent2:   #7A9B52;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.4;
      overscroll-behavior: none;
    }

    #wb-app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    #wb-header {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      padding: 10px 16px;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #wb-header-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    #wb-menu-version {
      font-size: 0.7rem;
      color: var(--faint);
      font-family: var(--font-mono);
    }

    #wb-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .wb-section {
      min-height: 100%;
      padding: 16px;
    }

    #wb-tabbar {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1.5px solid var(--border);
      padding: 5px 8px env(safe-area-inset-bottom, 0);
      display: flex;
    }

    .wb-tab {
      font-size: 10px;
      color: var(--faint);
      text-align: center;
      flex: 1;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 4px 2px;
      cursor: pointer;
      user-select: none;
      border-top: 2px solid transparent;
      transition: color 0.15s;
    }

    .wb-tab.active {
      color: var(--accent);
      font-weight: 700;
      border-top-color: var(--accent);
    }

    .wb-stub {
      color: var(--faint);
      font-size: 14px;
      padding: 32px 16px;
      text-align: center;
    }

    /* Startup-Screen */
    #wb-startup {
      position: fixed;
      inset: 0;
      background: var(--accent);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s;
    }

    #wb-startup-logo {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -1px;
    }

    #wb-startup-tagline {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      margin-top: 6px;
    }

    /* ── Cockpit Header ── */
    #ck-header {
      padding: 10px 16px;
      border-bottom: 1.5px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #ck-header-date { flex: 1; }
    #ck-header-day  { font-size: 15px; font-weight: 700; color: var(--text); }
    #ck-header-sub  { font-size: 13px; color: var(--muted); }
    .ck-tag-badge {
      display: inline-flex; padding: 3px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 700;
      background: var(--surface2); color: var(--muted);
    }
    .ck-header-stats { display: flex; gap: 16px; }
    .ck-stat { text-align: center; }
    .ck-stat-num {
      font-size: 20px; font-weight: 700; line-height: 1;
    }
    .ck-stat-lbl {
      font-size: 10px; color: var(--faint);
      text-transform: uppercase; letter-spacing: 0.05em; margin-top: 1px;
    }
    .ck-world-pill {
      background: var(--accent); color: #fff;
      font-size: 12px; font-weight: 700;
      padding: 4px 10px; border-radius: 20px;
      cursor: pointer;
    }

    /* ── Cockpit Content ── */
    #ck-scroll {
      flex: 1; overflow-y: auto; padding: 12px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }

    /* ── Block ── */
    .ck-block {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      overflow: hidden;
    }
    .ck-block-head {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .ck-block-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      color: var(--muted); flex: 1;
    }
    .ck-block-meta   { font-size: 12px; color: var(--faint); }
    .ck-block-action {
      font-size: 12px; color: var(--accent);
      font-weight: 600; cursor: pointer;
    }

    /* ── Pausierte Session ── */
    .ck-session-pill {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: rgba(10,107,94,0.06);
      border: 1.5px solid rgba(10,107,94,0.25);
      border-radius: var(--radius-sm);
      cursor: pointer;
    }
    .ck-sp-icon {
      width: 30px; height: 30px; border-radius: var(--radius-sm);
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .ck-sp-icon svg { width: 14px; height: 14px; fill: #fff; }
    .ck-sp-info { flex: 1; }
    .ck-sp-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .ck-sp-meta { font-size: 11px; color: var(--muted); }
    .ck-sp-badge {
      font-size: 11px; font-weight: 700;
      padding: 2px 7px; border-radius: 10px;
      background: var(--warn); color: #fff;
    }
    .ck-sp-resume {
      font-size: 12px; font-weight: 600;
      color: var(--accent); white-space: nowrap;
    }

    /* ── Nächster Termin Banner ── */
    .ck-next-banner {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: rgba(10,107,94,0.06);
      border-left: 3px solid var(--accent);
    }
    .ck-nb-time {
      font-size: 18px; font-weight: 700;
      color: var(--accent); flex-shrink: 0;
    }
    .ck-nb-text { font-size: 14px; color: var(--text); flex: 1; }
    .ck-nb-in   { font-size: 12px; color: var(--muted); white-space: nowrap; }

    /* ── Termine ── */
    .ck-termin-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px;
      border-bottom: 0.5px solid var(--border);
    }
    .ck-termin-row:last-child { border-bottom: none; }
    .ck-tr-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .ck-tr-time {
      font-size: 13px; font-weight: 700;
      color: var(--accent); width: 42px; flex-shrink: 0;
    }
    .ck-tr-text { font-size: 15px; color: var(--text); flex: 1; }
    .ck-tr-done { opacity: 0.4; text-decoration: line-through; }

    /* ── Aufgaben ── */
    .ck-aufg-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 14px;
      border-bottom: 0.5px solid var(--border);
    }
    .ck-aufg-row:last-child { border-bottom: none; }
    .ck-prio-dot {
      width: 6px; height: 6px; border-radius: 50%;
      flex-shrink: 0; margin-top: 6px;
    }
    .ck-aufg-check {
      width: 18px; height: 18px; border-radius: 4px;
      border: 2px solid var(--border);
      flex-shrink: 0; margin-top: 1px; cursor: pointer;
    }
    .ck-aufg-body { flex: 1; }
    .ck-aufg-text { font-size: 15px; color: var(--text); }
    .ck-aufg-sub  { font-size: 12px; color: var(--accent); margin-top: 2px; }
    .ck-aufg-meta { font-size: 12px; color: var(--faint); margin-top: 1px; }

    /* ── Wochenpflichten ── */
    .ck-pfl-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 14px;
      border-bottom: 0.5px solid var(--border);
    }
    .ck-pfl-row:last-child { border-bottom: none; }
    .ck-pfl-check {
      width: 17px; height: 17px; border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
    }
    .ck-pfl-check.done {
      background: var(--accent); border-color: var(--accent); color: #fff;
    }
    .ck-pfl-text { font-size: 15px; color: var(--text); flex: 1; }
    .ck-pfl-text.done { color: var(--faint); text-decoration: line-through; }

    /* ── Vorhaben-Anker ── */
    .ck-anker-grid {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 8px; padding: 10px 14px;
    }
    .ck-anker-card {
      background: var(--surface2); border-radius: var(--radius-sm);
      padding: 9px 11px; border-left: 3px solid var(--accent);
      cursor: pointer;
    }
    .ck-anker-card.privat { border-left-color: var(--accent2); }
    .ck-anker-title { font-size: 13px; font-weight: 600; color: var(--text); }
    .ck-anker-meta  { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .ck-anker-next  { font-size: 11px; color: var(--accent); margin-top: 3px; }

    /* ── Badge ── */
    .ck-badge {
      display: inline-flex; padding: 2px 8px;
      border-radius: 10px; font-size: 11px; font-weight: 700;
    }
    .ck-badge.beruf  { background: var(--accent);  color: #fff; }
    .ck-badge.privat { background: var(--accent2); color: #fff; }
    .ck-badge.pflicht{ background: var(--surface2); color: var(--muted); }
  </style>
</head>
<body>

<div id="wb-startup">
  <div id="wb-startup-logo">WorkBench</div>
  <div id="wb-startup-tagline">v1.2.0</div>
</div>

<div id="wb-app">

  <div id="wb-header">
    <div id="wb-header-title">WorkBench</div>
    <div id="wb-menu-version">v1.2.0 · Build 20260616-0720</div>
  </div>

  <div id="wb-content">
    <div id="sec-cockpit" class="wb-section" style="display:flex;flex-direction:column;padding:0">
      <div id="ck-header">
        <div id="ck-header-date">
          <div id="ck-header-day"></div>
          <div id="ck-header-sub"></div>
        </div>
        <div class="ck-header-stats">
          <div class="ck-stat">
            <div id="ck-stat-erledigt" class="ck-stat-num" style="color:var(--accent)">0</div>
            <div class="ck-stat-lbl">Erledigt</div>
          </div>
          <div class="ck-stat">
            <div id="ck-stat-ueberwunden" class="ck-stat-num" style="color:var(--accent2)">0</div>
            <div class="ck-stat-lbl">Überwindungen</div>
          </div>
          <div class="ck-stat">
            <div id="ck-stat-verschoben" class="ck-stat-num" style="color:var(--danger)">0</div>
            <div class="ck-stat-lbl">Verschoben</div>
          </div>
        </div>
        <div id="ck-world-pill" class="ck-world-pill" onclick="WB.ckToggleWorld()">BERUF</div>
      </div>
      <div id="ck-scroll">
        <div id="ck-session-area"></div>
        <div id="ck-next-banner-area"></div>
        <div id="ck-termine-block" class="ck-block"></div>
        <div id="ck-muss-block"    class="ck-block"></div>
        <div id="ck-sollte-block"  class="ck-block"></div>
        <div id="ck-pflichten-block" class="ck-block"></div>
        <div id="ck-vorhaben-block"  class="ck-block"></div>
      </div>
    </div>
    <div id="sec-backlog"  class="wb-section" style="display:none"><div class="wb-stub">Backlog — kommt in Prompt 3</div></div>
    <div id="sec-vorhaben" class="wb-section" style="display:none"><div class="wb-stub">Vorhaben — kommt in Prompt 4</div></div>
    <div id="sec-ablage"   class="wb-section" style="display:none"><div class="wb-stub">Ablage — kommt in Prompt 5</div></div>
    <div id="sec-woche"    class="wb-section" style="display:none"><div class="wb-stub">Woche — kommt in Prompt 6</div></div>
    <div id="sec-ziele"    class="wb-section" style="display:none"><div class="wb-stub">Ziele — kommt in Prompt 7</div></div>
  </div>

  <div id="wb-tabbar">
    <div class="wb-tab active" data-tab="cockpit"  onclick="WB.tabSwitch('cockpit')">Cockpit</div>
    <div class="wb-tab"        data-tab="backlog"  onclick="WB.tabSwitch('backlog')">Backlog</div>
    <div class="wb-tab"        data-tab="vorhaben" onclick="WB.tabSwitch('vorhaben')">Vorhaben</div>
    <div class="wb-tab"        data-tab="ablage"   onclick="WB.tabSwitch('ablage')">Ablage</div>
    <div class="wb-tab"        data-tab="woche"    onclick="WB.tabSwitch('woche')">Woche</div>
    <div class="wb-tab"        data-tab="ziele"    onclick="WB.tabSwitch('ziele')">Ziele</div>
  </div>

</div>

<script>
const WB = {

  APP_VERSION: '1.2.0',
  APP_BUILD:   '20260616-0720',

  IDB_NAME:    'workbench-v2',
  IDB_VERSION: 3,

  DRIVE_SCOPE: 'https://www.googleapis.com/auth/drive',
  DRIVE_API:   'https://www.googleapis.com/drive/v3',
  UPLOAD_API:  'https://www.googleapis.com/upload/drive/v3',

  dataPro:  null,
  dataPriv: null,
  activeWorld: 'beruf',
  isDirty: false,

  _idb: null,
  _idbDevice: null,
  _oauthClientId: null,
  _oauthToken: null,
  _oauthTokenExp: null,
  _oauthDriveFileIds: { pro: null, priv: null },

  activeTab: 'cockpit',

  tabSwitch(tab) {
    this.activeTab = tab;
    document.querySelectorAll('.wb-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    document.querySelectorAll('.wb-section').forEach(s => {
      s.style.display = 'none';
    });
    const sec = document.getElementById('sec-' + tab);
    if (sec) sec.style.display = tab === 'cockpit' ? 'flex' : 'block';
    this.renderSection(tab);
  },

  renderSection(tab) {
    switch(tab) {
      case 'cockpit':  this.renderCockpit();  break;
      case 'backlog':  this.renderBacklog();  break;
      case 'vorhaben': this.renderVorhaben(); break;
      case 'ablage':   this.renderAblage();   break;
      case 'woche':    this.renderWoche();    break;
      case 'ziele':    this.renderZiele();    break;
    }
  },

  // ── Cockpit ──────────────────────────────────────────

  renderCockpit() {
    this._ckRenderHeader();
    this._ckRenderSession();
    this._ckRenderNextBanner();
    this._ckRenderTermine();
    this._ckRenderAufgaben();
    this._ckRenderPflichten();
    this._ckRenderVorhaben();
  },

  _ckRenderHeader() {
    const now  = new Date();
    const days = ['Sonntag','Montag','Dienstag','Mittwoch',
                  'Donnerstag','Freitag','Samstag'];
    const months = ['Januar','Februar','März','April','Mai','Juni',
                    'Juli','August','September','Oktober',
                    'November','Dezember'];
    const dayName = days[now.getDay()];
    const dateStr = dayName + ', ' + now.getDate() + '. '
                    + months[now.getMonth()];
    const kw   = this._getCurrentKW ? this._getCurrentKW() : '';
    const year = now.getFullYear();

    const dayEl = document.getElementById('ck-header-day');
    const subEl = document.getElementById('ck-header-sub');
    if (dayEl) dayEl.textContent = dateStr;
    if (subEl) subEl.innerHTML   = year + ' \u00b7 KW ' + kw
      + ' \u00b7 <span class="ck-tag-badge">Arbeitstag</span>';

    // Zähler
    const db  = this.activeWorld === 'beruf' ? this.dataPro : this.dataPriv;
    const today = this._dStr(now);
    const ueberwunden = db?.bewegung?.ueberwunden || 0;
    const verschoben  = db?.bewegung?.verschoben  || 0;
    const erledigt    = db?.bewegung?.erledigt?.[today] || 0;
    const eEl = document.getElementById('ck-stat-erledigt');
    const uEl = document.getElementById('ck-stat-ueberwunden');
    const vEl = document.getElementById('ck-stat-verschoben');
    if (eEl) eEl.textContent = erledigt;
    if (uEl) uEl.textContent = ueberwunden;
    if (vEl) vEl.textContent = verschoben;

    // Welt-Pill
    const pill = document.getElementById('ck-world-pill');
    if (pill) pill.textContent = this.activeWorld === 'beruf' ? 'BERUF' : 'PRIVAT';
  },

  ckToggleWorld() {
    this.activeWorld = this.activeWorld === 'beruf' ? 'privat' : 'beruf';
    this.renderCockpit();
  },

  _ckRenderSession() {
    const area = document.getElementById('ck-session-area');
    if (!area) return;
    const session = this._ckActiveSession;
    if (!session) { area.innerHTML = ''; return; }
    area.innerHTML = '<div class="ck-session-pill"'
      + ' onclick="WB._ckResumeSession()">'
      + '<div class="ck-sp-icon"><svg viewBox="0 0 24 24">'
      + '<rect x="6" y="4" width="4" height="16"/>'
      + '<rect x="14" y="4" width="4" height="16"/></svg></div>'
      + '<div class="ck-sp-info">'
      + '<div class="ck-sp-name">' + this._esc(session.name) + '</div>'
      + '<div class="ck-sp-meta">Pausiert \u00b7 '
      + session.offenCount + ' Punkte offen</div></div>'
      + '<span class="ck-sp-badge">' + session.offenCount + ' offen</span>'
      + '<span class="ck-sp-resume">\u25b6 Fortfahren</span></div>';
  },

  _ckRenderNextBanner() {
    const area = document.getElementById('ck-next-banner-area');
    if (!area) return;
    const db    = this.activeWorld === 'beruf' ? this.dataPro : this.dataPriv;
    const today = this._dStr(new Date());
    const now   = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    const events = (db?.customEvents || [])
      .filter(e => e.date === today && e.startTime && !e.done)
      .map(e => {
        const [h, m] = e.startTime.split(':').map(Number);
        return { ...e, startMin: h * 60 + m };
      })
      .filter(e => e.startMin > nowMin)
      .sort((a, b) => a.startMin - b.startMin);
    if (!events.length) { area.innerHTML = ''; return; }
    const next = events[0];
    const diff = next.startMin - nowMin;
    const diffStr = diff < 60
      ? 'in ' + diff + ' Min'
      : 'in ' + Math.floor(diff/60) + 'h ' + (diff%60) + 'min';
    area.innerHTML = '<div class="ck-block">'
      + '<div class="ck-next-banner">'
      + '<div class="ck-nb-time">' + this._esc(next.startTime) + '</div>'
      + '<div class="ck-nb-text">' + this._esc(next.text) + '</div>'
      + '<div class="ck-nb-in">' + diffStr + '</div>'
      + '</div></div>';
  },

  _ckRenderTermine() {
    const el  = document.getElementById('ck-termine-block');
    if (!el) return;
    const db    = this.activeWorld === 'beruf' ? this.dataPro : this.dataPriv;
    const today = this._dStr(new Date());
    const now   = new Date();
    const nowMin = now.getHours() * 60 + now.getMinutes();
    const events = (db?.customEvents || [])
      .filter(e => e.date === today)
      .sort((a, b) => (a.startTime || '').localeCompare(b.startTime || ''));
    if (!events.length) { el.style.display = 'none'; return; }
    el.style.display = '';
    let h = '<div class="ck-block-head">'
      + '<span class="ck-block-label">Termine heute</span>'
      + '<span class="ck-block-meta">' + events.length + ' gesamt</span>'
      + '</div>';
    events.forEach(e => {
      const [eh, em] = (e.startTime || '00:00').split(':').map(Number);
      const eMin = eh * 60 + em;
      const past = e.startTime && eMin < nowMin;
      const isCurrent = e.startTime && eMin <= nowMin
        && eMin + (e.durationMin || 60) > nowMin;
      const welt  = e.welt || (this.activeWorld === 'beruf' ? 'pro' : 'priv');
      const color = welt === 'pro' ? 'var(--accent)' : 'var(--accent2)';
      const badge = welt === 'pro' ? 'beruf' : 'privat';
      h += '<div class="ck-termin-row"'
        + (isCurrent ? ' style="background:rgba(10,107,94,0.03)"' : '') + '>'
        + '<div class="ck-tr-dot" style="background:'
        + (past ? 'var(--faint)' : color) + '"></div>'
        + '<div class="ck-tr-time'
        + (past ? ' ck-tr-done' : '') + '">'
        + this._esc(e.startTime || '') + '</div>'
        + '<div class="ck-tr-text'
        + (past ? ' ck-tr-done' : '')
        + (isCurrent ? '" style="font-weight:600' : '') + '">'
        + this._esc(e.text) + '</div>'
        + '<span class="ck-badge ' + badge
        + (past ? '" style="opacity:0.5' : '') + '">'
        + (badge === 'beruf' ? 'Beruf' : 'Privat') + '</span>'
        + '</div>';
    });
    el.innerHTML = h;
  },

  _ckRenderAufgaben() {
    const mussEl   = document.getElementById('ck-muss-block');
    const sollteEl = document.getElementById('ck-sollte-block');
    if (!mussEl || !sollteEl) return;
    const db    = this.activeWorld === 'beruf' ? this.dataPro : this.dataPriv;
    const today = this._dStr(new Date());

    const aufgaben = [];
    (db?.vorhaben || [])
      .filter(v => v.aktiv !== false)
      .forEach(v => {
        (v.aufgaben || [])
          .filter(a => !a.done && a.datum === today)
          .forEach(a => {
            const offenCL = (a.checklist || [])
              .map((c,i) => ({...c, _idx: i}))
              .filter(c => !c.done);
            const naechsterSchritt = offenCL.length
              ? offenCL[0].text : (a.naechsterSchritt || '');
            aufgaben.push({
              ...a,
              _vorhabenTitel: v.titel,
              _welt: this.activeWorld === 'beruf' ? 'pro' : 'priv',
              _naechsterSchritt: naechsterSchritt,
              _offenCount: offenCL.length,
            });
          });
      });

    const muss   = aufgaben.filter(a => a.wichtigkeit === 'hoch');
    const sollte = aufgaben.filter(a => a.wichtigkeit !== 'hoch');

    const renderBlock = (el, label, color, items) => {
      if (!items.length) { el.style.display = 'none'; return; }
      el.style.display = '';
      let h = '<div class="ck-block-head">'
        + '<span style="width:9px;height:9px;border-radius:2px;'
        + 'background:' + color + ';display:inline-block;flex-shrink:0"></span>'
        + '<span class="ck-block-label">' + label + '</span>'
        + '<span class="ck-block-meta">' + items.length + ' offen</span></div>';
      items.forEach(a => {
        const verschobenCount = a.verschobenZaehler || 0;
        const warnColor = verschobenCount >= 3 ? 'var(--danger)' : color;
        const badge = verschobenCount >= 3
          ? '<span class="ck-badge beruf" style="background:var(--danger)">! Beruf</span>'
          : '<span class="ck-badge beruf">Beruf</span>';
        h += '<div class="ck-aufg-row">'
          + '<div class="ck-prio-dot" style="background:' + warnColor + '"></div>'
          + '<div class="ck-aufg-check"'
          + ' onclick="WB._ckCheckAufgabe(&quot;' + a.id + '&quot;)"></div>'
          + '<div class="ck-aufg-body">'
          + '<div class="ck-aufg-text">' + this._esc(a.text) + '</div>'
          + (a._naechsterSchritt
            ? '<div class="ck-aufg-sub">\u2192 ' + this._esc(a._naechsterSchritt) + '</div>' : '')
          + '<div class="ck-aufg-meta">'
          + this._esc(a._vorhabenTitel)
          + (a._offenCount ? ' \u00b7 ' + a._offenCount + ' offen' : '')
          + (verschobenCount >= 3 ? ' \u00b7 ' + verschobenCount + '\u00d7 verschoben' : '')
          + '</div></div>'
          + badge + '</div>';
      });
      el.innerHTML = h;
    };

    renderBlock(mussEl,   'Muss heute',   'var(--accent)',  muss);
    renderBlock(sollteEl, 'Sollte heute', 'var(--accent2)', sollte);
  },

  _ckCheckAufgabe(aufgabeId) {
    const db = this.activeWorld === 'beruf' ? this.dataPro : this.dataPriv;
    if (!db) return;
    (db.vorhaben || []).forEach(v => {
      (v.aufgaben || []).forEach(a => {
        if (a.id === aufgabeId) {
          a.done = true;
          a.doneTs = new Date().toISOString();
          if (!db.bewegung) db.bewegung = {};
          const today = this._dStr(new Date());
          if (!db.bewegung.erledigt) db.bewegung.erledigt = {};
          db.bewegung.erledigt[today] =
            (db.bewegung.erledigt[today] || 0) + 1;
        }
      });
    });
    this.setDirty();
    this.renderCockpit();
  },

  _ckRenderPflichten() {
    const el = document.getElementById('ck-pflichten-block');
    if (!el) return;
    const db  = this.activeWorld === 'beruf' ? this.dataPro : this.dataPriv;
    const now = new Date();
    const today = this._dStr(now);
    const todayDay = now.getDay();

    const pflichten = (db?.wochenpflichten || [])
      .filter(p => {
        if (p.taeglich) return true;
        return (p.wochentage || []).includes(todayDay);
      });

    if (!pflichten.length) { el.style.display = 'none'; return; }
    el.style.display = '';

    const erledigt = db?.pflichtStatus?.[today] || {};
    const doneCount = pflichten.filter(p => erledigt[p.id]).length;

    let h = '<div class="ck-block-head">'
      + '<span class="ck-block-label">Wochenpflichten heute</span>'
      + '<span class="ck-block-meta">'
      + doneCount + '/' + pflichten.length + ' heute</span></div>';

    pflichten.forEach(p => {
      const done = !!erledigt[p.id];
      h += '<div class="ck-pfl-row">'
        + '<div class="ck-pfl-check' + (done ? ' done' : '')
        + '" onclick="WB._ckCheckPflicht(&quot;' + p.id + '&quot;)">'
        + (done ? '\u2713' : '') + '</div>'
        + '<div class="ck-pfl-text' + (done ? ' done' : '') + '">'
        + this._esc(p.titel) + '</div>'
        + '<span class="ck-badge pflicht">'
        + (done ? 'erledigt' : (p.welt === 'pro' ? 'Beruf' : 'Privat'))
        + '</span></div>';
    });
    el.innerHTML = h;
  },

  _ckCheckPflicht(pflichtId) {
    const db = this.activeWorld === 'beruf' ? this.dataPro : this.dataPriv;
    if (!db) return;
    const today = this._dStr(new Date());
    if (!db.pflichtStatus) db.pflichtStatus = {};
    if (!db.pflichtStatus[today]) db.pflichtStatus[today] = {};
    db.pflichtStatus[today][pflichtId] =
      !db.pflichtStatus[today][pflichtId];
    this.setDirty();
    this._ckRenderPflichten();
  },

  _ckRenderVorhaben() {
    const el = document.getElementById('ck-vorhaben-block');
    if (!el) return;
    const db = this.activeWorld === 'beruf' ? this.dataPro : this.dataPriv;
    const fokus = (db?.vorhaben || [])
      .filter(v => v.fokus && v.aktiv !== false)
      .slice(0, 3);
    if (!fokus.length) { el.style.display = 'none'; return; }
    el.style.display = '';
    let h = '<div class="ck-block-head">'
      + '<span class="ck-block-label">Aktive Vorhaben</span></div>'
      + '<div class="ck-anker-grid">';
    fokus.forEach(v => {
      const welt = v.welt || (this.activeWorld === 'beruf' ? 'pro' : 'priv');
      const isPrivat = welt === 'priv';
      const naechster = (v.aufgaben || [])
        .filter(a => !a.done)
        .map(a => {
          const offenCL = (a.checklist || []).filter(c => !c.done);
          return offenCL.length ? offenCL[0].text : a.naechsterSchritt;
        })
        .find(Boolean) || '';
      h += '<div class="ck-anker-card' + (isPrivat ? ' privat' : '') + '"'
        + ' onclick="WB.tabSwitch(\'vorhaben\')">'
        + '<div class="ck-anker-title">' + this._esc(v.titel) + '</div>'
        + '<div class="ck-anker-meta">'
        + (isPrivat ? 'Privat' : 'Beruf') + '</div>'
        + (naechster
          ? '<div class="ck-anker-next">\u2192 ' + this._esc(naechster) + '</div>' : '')
        + '</div>';
    });
    h += '</div>';
    el.innerHTML = h;
  },

  _ckActiveSession: null,

  _ckResumeSession() {
    this._toast('Fokus-Timer kommt in einem späteren Update');
  },

  _ckEnsureDb(ctx) {
    const db = ctx === 'pro' ? this.dataPro : this.dataPriv;
    if (!db) return null;
    if (!db.vorhaben)        db.vorhaben        = [];
    if (!db.customEvents)    db.customEvents    = [];
    if (!db.wochenpflichten) db.wochenpflichten = [];
    if (!db.pflichtStatus)   db.pflichtStatus   = {};
    if (!db.bewegung)        db.bewegung        = {
      ueberwunden: 0, verschoben: 0, erledigt: {}
    };
    return db;
  },

  // ── Stub-Render für spätere Prompts ──────────────────

  renderBacklog()  { /* Prompt 3 */ },
  renderVorhaben() { /* Prompt 4 */ },
  renderAblage()   { /* Prompt 5 */ },
  renderWoche()    { /* Prompt 6 */ },
  renderZiele()    { /* Prompt 7 */ },

  // ── IDB ──────────────────────────────────────────────

  async idbOpen() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(this.IDB_NAME, this.IDB_VERSION);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('data')) db.createObjectStore('data');
        if (!db.objectStoreNames.contains('meta')) db.createObjectStore('meta');
      };
      req.onsuccess = e => { this._idb = e.target.result; resolve(); };
      req.onerror   = e => reject(e.target.error);
      req.onblocked = () => resolve();
    });
  },

  async idbGet(store, key) {
    return new Promise((resolve, reject) => {
      const tx  = this._idb.transaction(store, 'readonly');
      const req = tx.objectStore(store).get(key);
      req.onsuccess = e => resolve(e.target.result ?? null);
      req.onerror   = e => reject(e.target.error);
    });
  },

  async idbSet(store, key, val) {
    return new Promise((resolve, reject) => {
      const tx  = this._idb.transaction(store, 'readwrite');
      const req = tx.objectStore(store).put(val, key);
      req.onsuccess = () => resolve();
      req.onerror   = e => reject(e.target.error);
    });
  },

  async idbLoadAll() {
    try {
      const pro  = await this.idbGet('data', 'dataPro');
      const priv = await this.idbGet('data', 'dataPriv');
      if (pro)  this.dataPro  = pro;
      if (priv) this.dataPriv = priv;
      const clientId = await this.idbGet('meta', 'oauthClientId');
      if (clientId) this._oauthClientId = clientId;
      const token    = await this.idbGet('meta', 'oauthToken');
      const tokenExp = await this.idbGet('meta', 'oauthTokenExp');
      if (token && tokenExp) { this._oauthToken = token; this._oauthTokenExp = tokenExp; }
      const driveIdPro  = await this.idbGet('meta', 'driveFileId_pro');
      const driveIdPriv = await this.idbGet('meta', 'driveFileId_priv');
      if (driveIdPro)  this._oauthDriveFileIds.pro  = driveIdPro;
      if (driveIdPriv) this._oauthDriveFileIds.priv = driveIdPriv;
    } catch(e) {
      console.error('[IDB] load error:', e);
    }
  },

  async idbSaveAll() {
    try {
      if (this.dataPro)  await this.idbSet('data', 'dataPro',  this.dataPro);
      if (this.dataPriv) await this.idbSet('data', 'dataPriv', this.dataPriv);
      await this.idbSet('meta', 'lastSaved', Date.now());
      this.isDirty = false;
    } catch(e) {
      this._toast('Speicherfehler: ' + e.message);
    }
  },

  setDirty() {
    this.isDirty = true;
    clearTimeout(this._saveTimer);
    this._saveTimer = setTimeout(() => this.idbSaveAll(), 2000);
  },

  // ── KW-Hilfsfunktionen ───────────────────────────────

  _kwStartDate() {
    const d = new Date();
    const day = d.getDay();
    d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
    return this._dStr(d);
  },

  _kwEndDate() {
    const d = new Date();
    const day = d.getDay();
    d.setDate(d.getDate() + (day === 0 ? 0 : 7 - day));
    return this._dStr(d);
  },

  _kwStr(date) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    const kw = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    return d.getUTCFullYear() + '-W' + String(kw).padStart(2, '0');
  },

  _getCurrentKW() {
    const now = new Date();
    return this._kwStr(now).split('-W')[1];
  },

  // ── Google Drive OAuth ────────────────────────────────

  _oauthTokenValid() {
    return !!(this._oauthToken && this._oauthTokenExp && Date.now() < this._oauthTokenExp);
  },

  async _oauthGetToken(silent) {
    if (this._oauthTokenValid()) return this._oauthToken;
    if (silent) return null;
    return new Promise((resolve, reject) => {
      if (!this._oauthClientId) { reject(new Error('Keine Client-ID')); return; }
      if (!window.google?.accounts?.oauth2) { reject(new Error('Google Identity Services fehlt')); return; }
      const client = google.accounts.oauth2.initTokenClient({
        client_id: this._oauthClientId,
        scope:     this.DRIVE_SCOPE,
        callback:  async (resp) => {
          if (resp.error) { reject(new Error(resp.error)); return; }
          this._oauthToken    = resp.access_token;
          this._oauthTokenExp = Date.now() + (resp.expires_in - 60) * 1000;
          await this.idbSet('meta', 'oauthToken',    this._oauthToken);
          await this.idbSet('meta', 'oauthTokenExp', this._oauthTokenExp);
          resolve(this._oauthToken);
        },
      });
      client.requestAccessToken();
    });
  },

  async _oauthFindOrCreateFile(token, ctx) {
    const filename = ctx === 'pro' ? 'workbench-beruf.json' : 'workbench-privat.json';
    const cached = this._oauthDriveFileIds[ctx];
    if (cached) return cached;
    const search = await fetch(
      this.DRIVE_API + '/files?q=' + encodeURIComponent("name='" + filename + "' and trashed=false") + '&fields=files(id,name)',
      { headers: { Authorization: 'Bearer ' + token } }
    );
    const data = await search.json();
    if (data.files?.length) {
      this._oauthDriveFileIds[ctx] = data.files[0].id;
      await this.idbSet('meta', 'driveFileId_' + ctx, data.files[0].id);
      return data.files[0].id;
    }
    const meta = new Blob([JSON.stringify({ name: filename, mimeType: 'application/json' })], { type: 'application/json' });
    const create = await fetch(this.UPLOAD_API + '/files?uploadType=multipart', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + token },
      body: (() => { const f = new FormData(); f.append('metadata', meta); f.append('file', new Blob(['{}'], { type: 'application/json' })); return f; })(),
    });
    const created = await create.json();
    this._oauthDriveFileIds[ctx] = created.id;
    await this.idbSet('meta', 'driveFileId_' + ctx, created.id);
    return created.id;
  },

  async oauthSyncUpload(ctx) {
    try {
      const token  = await this._oauthGetToken(false);
      const fileId = await this._oauthFindOrCreateFile(token, ctx);
      const db     = ctx === 'pro' ? this.dataPro : this.dataPriv;
      if (!db) { this._toast('Keine Daten zum Hochladen'); return; }
      const payload = JSON.stringify({ data: db, _exported: new Date().toISOString() });
      await fetch(this.UPLOAD_API + '/files/' + fileId + '?uploadType=media', {
        method:  'PATCH',
        headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
        body:    payload,
      });
      this._toast('✓ Hochgeladen: ' + (ctx === 'pro' ? 'Beruf' : 'Privat'));
    } catch(e) {
      this._toast('Upload-Fehler: ' + e.message);
    }
  },

  async oauthSyncDownload(ctx) {
    try {
      const token  = await this._oauthGetToken(false);
      const fileId = await this._oauthFindOrCreateFile(token, ctx);
      const resp   = await fetch(this.DRIVE_API + '/files/' + fileId + '?alt=media', {
        headers: { Authorization: 'Bearer ' + token },
      });
      const result = await resp.json();
      const db = result.data || result;
      if (ctx === 'pro') this.dataPro  = db;
      else               this.dataPriv = db;
      await this.idbSaveAll();
      this._toast('✓ Heruntergeladen: ' + (ctx === 'pro' ? 'Beruf' : 'Privat'));
      this.renderSection(this.activeTab);
    } catch(e) {
      this._toast('Download-Fehler: ' + e.message);
    }
  },

  // ── Hilfsfunktionen ──────────────────────────────────

  _esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  },

  _toast(msg, dur) {
    dur = dur || 2500;
    const t = document.createElement('div');
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1F24;color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.2s;white-space:nowrap;';
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(() => { t.style.opacity = '1'; });
    setTimeout(() => {
      t.style.opacity = '0';
      setTimeout(() => t.remove(), 200);
    }, dur);
  },

  _dStr(d) {
    // IMMER lokale Zeit — niemals toISOString() für Datumstrings!
    return d.getFullYear() + '-'
      + String(d.getMonth() + 1).padStart(2, '0') + '-'
      + String(d.getDate()).padStart(2, '0');
  },

  // ── Init ─────────────────────────────────────────────

  async init() {
    // Startup ausblenden
    setTimeout(() => {
      const s = document.getElementById('wb-startup');
      if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 300); }
    }, 800);

    // IDB öffnen und Daten laden
    try {
      await this.idbOpen();
      await this.idbLoadAll();
    } catch(e) {
      console.error('[init] IDB error:', e);
    }

    this.tabSwitch('cockpit');
  },

};

document.addEventListener('DOMContentLoaded', () => WB.init());
</script>
